<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Hangman - Pro Edition</title>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1880946354382681" crossorigin="anonymous"></script>
    <!-- Kelimeler dosyasını asmaca klasöründen çekiyoruz -->
    <script src="sorular/kelimeler.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff007f;
            --bg-dark: #080b12;
            --card-bg: rgba(20, 25, 40, 0.9);
            --text: #ffffff;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #1a2238 0%, #080b12 100%);
            overflow-x: hidden;
        }

        /* Navigasyon Çubuğu */
        .nav-bar {
            width: 100%;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            margin-bottom: 20px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--neon-blue);
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            background: transparent;
            border: 1px solid var(--neon-blue);
            padding: 8px 15px;
            border-radius: 5px;
        }

        .back-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .container {
            width: 90%;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        /* Çizim Bölümü */
        .drawing-side {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        .hangman-svg {
            width: 100%;
            height: 250px;
            stroke: #fff;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
        }

        .part { opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .is-visible { opacity: 1; stroke: var(--neon-pink); }

        /* Oyun Bölümü */
        .game-side {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .word-display {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .letter {
            width: 35px;
            height: 50px;
            border-bottom: 4px solid var(--neon-blue);
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .hint-box {
            background: linear-gradient(90deg, rgba(255, 0, 127, 0.2), transparent);
            border-left: 4px solid var(--neon-pink);
            padding: 15px;
            border-radius: 0 10px 10px 0;
            margin-bottom: 25px;
        }

        .hint-box b { color: var(--neon-pink); font-family: 'Orbitron'; }

        /* Klavye */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
            gap: 10px;
        }

        .key {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 0;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            transition: 0.2s ease;
        }

        .key:hover:not(:disabled) {
            background: var(--neon-blue);
            color: black;
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .key:disabled { opacity: 0.2; cursor: not-allowed; }
        .key.hit { background: var(--neon-blue); color: black; border: none; }
        .key.miss { background: var(--neon-pink); color: white; border: none; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .modal-box {
            background: #141928;
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 50px var(--neon-blue);
        }

        .restart-btn {
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 25px;
            font-family: 'Orbitron';
            letter-spacing: 1px;
        }

        /* ── AdSense Reklam Kutusu ── */
        .mg-ad-box {
            position: relative;
            width: 90%;
            max-width: 900px;
            background: rgba(20, 25, 40, 0.85);
            border: 1px solid rgba(0, 242, 255, 0.12);
            border-radius: 20px;
            padding: 28px 12px 12px;
            margin: 20px auto;
            overflow: visible;
            box-sizing: border-box;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }
        .mg-ad-box ins.adsbygoogle {
            display: block !important;
            width: 300px !important;
            height: 250px !important;
        }
        .mg-ad-label {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            font-weight: 700;
            color: rgba(0, 242, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #141928;
            padding: 2px 12px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.15);
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
            font-family: 'Orbitron', sans-serif;
        }
        /* Modal içi reklam */
        .mg-ad-box-modal {
            position: relative;
            background: rgba(8, 11, 18, 0.9);
            border: 1px solid rgba(0, 242, 255, 0.15);
            border-radius: 16px;
            padding: 28px 12px 12px;
            margin-top: 20px;
            overflow: visible;
            box-sizing: border-box;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mg-ad-box-modal ins.adsbygoogle {
            display: block !important;
            width: 300px !important;
            height: 250px !important;
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <button class="back-btn" onclick="window.history.back()">
            ← GERİ DÖN
        </button>
        <h1 style="font-family: 'Orbitron'; color: var(--neon-blue); font-size: 1.2rem; margin: 0;">ADAM ASMACA</h1>
        <div style="font-size: 0.8rem; opacity: 0.7;">Hata: <span id="mistakeCount" style="color: var(--neon-pink)">0</span>/6</div>
    </nav>

    <div class="container">
        <!-- Çizim Alanı -->
        <div class="drawing-side">
            <svg class="hangman-svg" viewBox="0 0 100 100">
                <path d="M20 90 L80 90 M30 90 L30 10 L70 10 L70 20" />
                <circle id="p1" class="part" cx="70" cy="30" r="8" />
                <line id="p2" class="part" x1="70" y1="38" x2="70" y2="65" />
                <line id="p3" class="part" x1="70" y1="45" x2="55" y2="55" />
                <line id="p4" class="part" x1="70" y1="45" x2="85" y2="55" />
                <line id="p5" class="part" x1="70" y1="65" x2="55" y2="80" />
                <line id="p6" class="part" x1="70" y1="65" x2="85" y2="80" />
            </svg>
        </div>

        <!-- Oyun Alanı -->
        <div class="game-side">
            <div class="hint-box">
                <b>İPUCU:</b> <br>
                <span id="hintText">Yükleniyor...</span>
            </div>
            
            <div id="wordDisplay" class="word-display"></div>

            <div id="keyboard" class="keyboard"></div>
        </div>
    </div>

    <!-- ── ADSENSE REKLAM 1 — Oyun Alanı Altı ── -->
    <div class="mg-ad-box" aria-label="Reklam" role="complementary">
        <span class="mg-ad-label">Reklam</span>
        <ins class="adsbygoogle"
             style="display:block;width:300px;height:250px;"
             data-ad-client="ca-pub-1880946354382681"
             data-ad-slot="1689789138"
             data-ad-format="rectangle"></ins>
    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <h2 id="modalTitle" style="font-family: Orbitron; font-size: 2.5rem; margin: 0;"></h2>
            <p id="modalMsg" style="margin: 20px 0; font-size: 1.1rem; opacity: 0.9;"></p>
            <button class="restart-btn" onclick="initGame()">TEKRAR OYNA</button>

            <!-- ── ADSENSE REKLAM 2 — Oyun Sonu ── -->
            <div class="mg-ad-box-modal" aria-label="Reklam" role="complementary">
                <span class="mg-ad-label">Reklam</span>
                <ins class="adsbygoogle"
                     style="display:block;width:300px;height:250px;"
                     data-ad-client="ca-pub-1880946354382681"
                     data-ad-slot="1689789138"
                     data-ad-format="rectangle"></ins>
            </div>
        </div>
    </div>

    <script>
        // Hata koruması
        const yedekKelimeler = [{ kelime: "ASMACA", ipucu: "Bu oyunun adı nedir?" }];
        let aktifListe = (typeof kelimeListesi !== 'undefined') ? kelimeListesi : yedekKelimeler;

        let word, hint, guessed, mistakes;
        const maxMistakes = 6;

        function initGame() {
            const item = aktifListe[Math.floor(Math.random() * aktifListe.length)];
            word = item.kelime.toUpperCase('tr-TR');
            hint = item.ipucu;
            guessed = [];
            mistakes = 0;

            document.getElementById("mistakeCount").innerText = mistakes;
            document.getElementById("hintText").innerText = hint;
            document.getElementById("modal").style.display = "none";
            document.querySelectorAll(".part").forEach(p => p.classList.remove("is-visible"));

            renderWord();
            renderKeyboard();
        }

        function renderWord() {
            const display = word.split("").map(l => `
                <div class="letter">${guessed.includes(l) ? l : ""}</div>
            `).join("");
            document.getElementById("wordDisplay").innerHTML = display;

            if (word.split("").every(l => guessed.includes(l))) endGame(true);
        }

        function renderKeyboard() {
            const harfler = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
            const kb = document.getElementById("keyboard");
            kb.innerHTML = "";
            
            harfler.split("").forEach(l => {
                const btn = document.createElement("button");
                btn.className = "key";
                btn.innerText = l;
                btn.onclick = () => handleGuess(l);
                kb.appendChild(btn);
            });
        }

        function handleGuess(l) {
            if (guessed.includes(l) || mistakes >= maxMistakes) return;
            guessed.push(l);

            const buttons = document.querySelectorAll(".key");
            const btn = Array.from(buttons).find(b => b.innerText === l);

            if (word.includes(l)) {
                if(btn) btn.classList.add("hit");
                renderWord();
            } else {
                mistakes++;
                if(btn) btn.classList.add("miss");
                document.getElementById("mistakeCount").innerText = mistakes;
                const part = document.getElementById(`p${mistakes}`);
                if(part) part.classList.add("is-visible");
                
                if (mistakes === maxMistakes) endGame(false);
            }
            if(btn) btn.disabled = true;
        }

        function endGame(isWin) {
            const modal = document.getElementById("modal");
            const title = document.getElementById("modalTitle");
            title.innerText = isWin ? "MUHTEŞEM! 🎉" : "KAYBETTİN! 💀";
            title.style.color = isWin ? "var(--neon-blue)" : "var(--neon-pink)";
            document.getElementById("modalMsg").innerText = isWin ? "Kelimeyi başarıyla buldun!" : `Doğru kelime: ${word}`;
            modal.style.display = "flex";
        }

        // Klavye desteği
        window.onkeydown = (e) => {
            let key = e.key.toUpperCase('tr-TR');
            if(key === "I") key = "İ"; 
            const harfler = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
            if (harfler.includes(key)) handleGuess(key);
        };

        window.onload = initGame;
    </script>

    <!-- ── AdSense Lazy Push ── -->
    <script>
    (function() {
        function mgPushAds() {
            document.querySelectorAll('ins.adsbygoogle').forEach(function(ins) {
                if (!ins.getAttribute('data-adsbygoogle-status')) {
                    try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
                }
            });
        }
        // Sayfa yüklenince push et
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() { setTimeout(mgPushAds, 800); });
        } else {
            setTimeout(mgPushAds, 800);
        }
        // Modal açılınca (oyun bitince) push et
        document.addEventListener('DOMContentLoaded', function() {
            var modal = document.getElementById('modal');
            if (modal) {
                new MutationObserver(function(mutations) {
                    mutations.forEach(function(m) {
                        if (m.type === 'attributes' && m.attributeName === 'style') {
                            if (modal.style.display === 'flex') { setTimeout(mgPushAds, 300); }
                        }
                    });
                }).observe(modal, { attributes: true });
            }
        });
    })();
    </script>

</body>
</html>
