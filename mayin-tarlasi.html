<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayın Tarlası Pro - Yeşil</title>
    <style>
        :root {
            --primary-green: #27ae60;
            --hover-green: #2ecc71;
            --bg-color: #f0f3f1;
            --card-bg: #ffffff;
            --hidden-cell: #2ecc71;
            --revealed-cell: #ecf0f1;
            --danger: #e74c3c;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            color: var(--text-dark);
        }

        /* Üst Bar */
        .top-bar {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: flex-start;
            padding: 15px;
            box-sizing: border-box;
        }

        .back-btn {
            background: white;
            border: 1px solid #ddd;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        /* Zorluk Seçimi */
        .difficulty-picker {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .diff-btn {
            padding: 6px 12px;
            border: 2px solid var(--primary-green);
            background: transparent;
            color: var(--primary-green);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .diff-btn.active {
            background: var(--primary-green);
            color: white;
        }

        /* Oyun Alanı */
        .game-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 95vw;
        }

        .stats-bar {
            display: flex;
            width: 100%;
            justify-content: space-around;
            margin-bottom: 15px;
            background: #f9fbf9;
            padding: 10px;
            border-radius: 15px;
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #7f8c8d; font-weight: bold; }
        .stat-value { font-size: 1.2rem; font-weight: 800; color: var(--primary-green); display: block; }

        /* Izgara */
        #grid-wrapper {
            overflow: auto;
            max-width: 100%;
            padding: 5px;
        }

        #grid {
            display: grid;
            gap: 4px;
            background: #ecf0f1;
            padding: 8px;
            border-radius: 12px;
        }

        .cell {
            width: 30px;
            height: 30px;
            background-color: var(--hidden-cell);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.15s;
            box-shadow: 0 3px 0 #219150;
            color: white;
        }

        .cell.revealed {
            background-color: var(--revealed-cell);
            box-shadow: none;
            cursor: default;
            color: #34495e;
        }

        .cell.flagged {
            background-color: #f1c40f !important;
            box-shadow: 0 3px 0 #c29d0b;
        }

        .cell.mine { background-color: var(--danger) !important; box-shadow: none; }

        /* Sayı Renkleri */
        .n1 { color: #2980b9; } .n2 { color: #27ae60; } .n3 { color: #e67e22; } .n4 { color: #8e44ad; }

        /* Kontroller */
        .bottom-controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .flag-toggle-btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .flag-toggle-btn.active {
            border-color: #f1c40f;
            background: #fef9e7;
        }

        .reset-btn {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(39,174,96,0.3);
        }

        #best-score { color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="back-btn" onclick="history.back()">← Geri Dön</button>
    </div>

    <div class="difficulty-picker">
        <button class="diff-btn active" onclick="changeDifficulty('easy', this)">Kolay</button>
        <button class="diff-btn" onclick="changeDifficulty('medium', this)">Orta</button>
        <button class="diff-btn" onclick="changeDifficulty('hard', this)">Uzman</button>
    </div>

    <div class="game-container">
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-label">🚩 KALAN</span>
                <span id="mine-count" class="stat-value">10</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">⏱️ SÜRE</span>
                <span id="timer" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">🏆 REKOR</span>
                <span id="best-score" class="stat-value">-</span>
            </div>
        </div>

        <div id="grid-wrapper">
            <div id="grid"></div>
        </div>

        <div class="bottom-controls">
            <button id="flag-mode" class="flag-toggle-btn" onclick="toggleFlagMode()">
                📍 Mod: Aç
            </button>
            <button class="reset-btn" onclick="initGame()">Yeniden Başlat</button>
        </div>
    </div>

    <script>
        let configs = {
            easy: { r: 10, c: 10, m: 10 },
            medium: { r: 15, c: 15, m: 35 },
            hard: { r: 20, c: 20, m: 75 }
        };

        let currentDiff = 'easy';
        let rows, cols, minesTotal;
        let board = [], minesLeft, revealedCount, gameActive, timer, timerInterval, firstClick;
        let isFlagMode = false;

        function changeDifficulty(level, btn) {
            currentDiff = level;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            initGame();
        }

        function initGame() {
            rows = configs[currentDiff].r;
            cols = configs[currentDiff].c;
            minesTotal = configs[currentDiff].m;
            
            board = [];
            revealedCount = 0;
            gameActive = true;
            firstClick = true;
            minesLeft = minesTotal;
            timer = 0;
            clearInterval(timerInterval);
            
            document.getElementById('timer').textContent = "0";
            document.getElementById('mine-count').textContent = minesLeft;
            updateBestScoreDisplay();
            
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${cols}, 30px)`;
            grid.innerHTML = '';

            for (let r = 0; r < rows; r++) {
                board[r] = [];
                for (let c = 0; c < cols; c++) {
                    const cellEl = document.createElement('div');
                    cellEl.className = 'cell';
                    cellEl.onmousedown = (e) => handleInteraction(r, c, e);
                    cellEl.oncontextmenu = (e) => e.preventDefault();
                    
                    grid.appendChild(cellEl);
                    board[r][c] = { mine: false, revealed: false, flagged: false, count: 0, el: cellEl };
                }
            }
        }

        function handleInteraction(r, c, e) {
            if (!gameActive) return;
            // Sağ tık veya Bayrak Modu aktifken sol tık
            if (e.button === 2 || isFlagMode) {
                handleRightClick(r, c);
            } else {
                handleLeftClick(r, c);
            }
        }

        function toggleFlagMode() {
            isFlagMode = !isFlagMode;
            const btn = document.getElementById('flag-mode');
            btn.classList.toggle('active');
            btn.textContent = isFlagMode ? "📍 Mod: Bayrak" : "📍 Mod: Aç";
        }

        function handleLeftClick(r, c) {
            const cell = board[r][c];
            if (cell.revealed || cell.flagged) return;

            if (firstClick) {
                firstClick = false;
                placeMines(r, c);
                startTimer();
            }

            if (cell.mine) {
                gameOver(false);
                return;
            }

            reveal(r, c);
            if (revealedCount === (rows * cols) - minesTotal) gameOver(true);
        }

        function handleRightClick(r, c) {
            const cell = board[r][c];
            if (cell.revealed) return;

            cell.flagged = !cell.flagged;
            cell.el.classList.toggle('flagged');
            cell.el.textContent = cell.flagged ? '🚩' : '';
            minesLeft += cell.flagged ? -1 : 1;
            document.getElementById('mine-count').textContent = Math.max(0, minesLeft);
        }

        function placeMines(exR, exC) {
            let placed = 0;
            while (placed < minesTotal) {
                let r = Math.floor(Math.random() * rows);
                let c = Math.floor(Math.random() * cols);
                if (!board[r][c].mine && (Math.abs(r-exR) > 1 || Math.abs(c-exC) > 1)) {
                    board[r][c].mine = true;
                    placed++;
                }
            }
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (!board[r][c].mine) board[r][c].count = countNeighbors(r, c);
                }
            }
        }

        function countNeighbors(r, c) {
            let count = 0;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    let nr = r+dr, nc = c+dc;
                    if (nr>=0 && nr<rows && nc>=0 && nc<cols && board[nr][nc].mine) count++;
                }
            }
            return count;
        }

        function reveal(r, c) {
            const cell = board[r][c];
            if (cell.revealed || cell.flagged) return;

            cell.revealed = true;
            cell.el.classList.add('revealed');
            revealedCount++;

            if (cell.count > 0) {
                cell.el.textContent = cell.count;
                cell.el.classList.add('n' + (cell.count > 4 ? 4 : cell.count));
            } else {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        let nr = r+dr, nc = c+dc;
                        if (nr>=0 && nr<rows && nc>=0 && nc<cols) reveal(nr, nc);
                    }
                }
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timer++;
                document.getElementById('timer').textContent = timer;
            }, 1000);
        }

        function gameOver(win) {
            gameActive = false;
            clearInterval(timerInterval);
            board.forEach(row => row.forEach(cell => {
                if (cell.mine) {
                    cell.el.classList.add('revealed', 'mine');
                    cell.el.textContent = '💣';
                }
            }));

            if (win) {
                saveBestScore(timer);
                alert("Tebrikler! Kazandın! 🏆 Süre: " + timer + "s");
            } else {
                alert("Mayına bastın! 💥 Tekrar dene.");
            }
        }

        function saveBestScore(score) {
            let key = 'best_' + currentDiff;
            let currentBest = localStorage.getItem(key);
            if (!currentBest || score < currentBest) {
                localStorage.setItem(key, score);
                updateBestScoreDisplay();
            }
        }

        function updateBestScoreDisplay() {
            let best = localStorage.getItem('best_' + currentDiff);
            document.getElementById('best-score').textContent = best ? best + "s" : "-";
        }

        initGame();
    </script>
</body>
</html>
