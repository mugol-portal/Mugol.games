        let favorites = JSON.parse(localStorage.getItem('mugolFavorites')) || [];
        let currentFilter = 'all';

        window.onload = () => {
            generateUI();
            updateDailyHero();
            renderGames();
            setTimeout(() => document.getElementById('pageLoader').classList.remove('active'), 500);
        };

        function generateUI() {
            const filterContainer = document.getElementById('filtersContainer');
            const menuContainer = document.getElementById('category-menu-container');
            Object.keys(categories).forEach(catId => {
                const cat = categories[catId];
                filterContainer.innerHTML += `<button class="filter-btn" id="filter-${catId}" onclick="filterGames('${catId}')">${cat.icon} ${cat.name}</button>`;
                menuContainer.innerHTML += `<div class="menu-item" id="menu-${catId}" onclick="filterGames('${catId}')"><div class="menu-item-icon" style="background:${cat.color}25; color:${cat.color};">${cat.icon}</div><span>${cat.name}</span></div>`;
            });
            document.getElementById('count-all').innerText = gamesDB.length;
            document.getElementById('count-favorites').innerText = favorites.length;
        }

        function renderGames(searchQuery = '') {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';
            let filtered = gamesDB;
            if (currentFilter === 'favorites') filtered = gamesDB.filter(g => favorites.includes(g.id));
            else if (currentFilter !== 'all') filtered = gamesDB.filter(g => g.catId === currentFilter);
            
            if (searchQuery) filtered = filtered.filter(g => g.title.toLowerCase().includes(searchQuery.toLowerCase()));

            document.getElementById('gameCountText').innerText = `${filtered.length} Oyun`;
            filtered.forEach(game => {
                const isFav = favorites.includes(game.id);
                grid.innerHTML += `
                    <div class="game-card" onclick="openGame(event, '${game.url}')">
                        ${game.badge ? `<div class="card-badge">${game.badge}</div>` : ''}
                        <div class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite(event, '${game.id}')"><i class="fa-solid fa-heart"></i></div>
                        <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
                        <div class="game-thumb" style="background:linear-gradient(135deg, ${game.color1}, ${game.color2})">${game.icon}</div>
                        <div class="game-info">
                            <div class="game-title">${game.title}</div>
                            <div class="game-cat" style="color:${game.color1}">${game.catName}</div>
                        </div>
                    </div>`;
            });
        }

        function updateDailyHero() {
            const game = gamesDB[0]; // İlk oyunu (Labirent) hero yapalım
            document.getElementById('heroTitle').innerText = game.title;
            document.getElementById('heroDesc').innerText = game.desc;
            document.getElementById('heroIcon').innerText = game.icon;
            document.getElementById('heroBtn').onclick = (e) => openGame(e, game.url);
        }

        function openGame(e, url) {
            if(e) e.preventDefault();
            document.getElementById('pageLoader').classList.add('active');
            setTimeout(() => location.href = url, 400);
        }

        function filterGames(id) {
            currentFilter = id;
            document.querySelectorAll('.filter-btn, .menu-item').forEach(el => el.classList.remove('active', 'active-cat'));
            document.getElementById('filter-' + id)?.classList.add('active');
            renderGames();
            closeMenu();
        }

        function toggleFavorite(e, id) {
            e.stopPropagation();
            const idx = favorites.indexOf(id);
            if(idx === -1) favorites.push(id); else favorites.splice(idx, 1);
            localStorage.setItem('mugolFavorites', JSON.stringify(favorites));
            document.getElementById('count-favorites').innerText = favorites.length;
            renderGames();
        }

        function openMenu() { document.getElementById('sideMenu').classList.add('active'); document.getElementById('menuOverlay').classList.add('active'); }
        function closeMenu() { document.getElementById('sideMenu').classList.remove('active'); document.getElementById('menuOverlay').classList.remove('active'); }
        function setMode(mode) {
            const frame = document.getElementById('deviceFrame');
            document.querySelectorAll('.sim-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            frame.className = 'device-frame ' + (mode === 'desktop' ? '' : mode);
        }
    </script>
</body>
</html>
