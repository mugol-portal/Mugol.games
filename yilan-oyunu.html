<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuGöl GAMES - Yılan Oyunu V3.1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
            /* overflow: hidden; BURASI KALDIRILDI - SAYFA ARTIK AŞAĞI KAYABİLİR */
        }

        #gameContainer {
            width: 100%;
            max-width: 500px;
            background: rgba(30, 45, 60, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            position: relative;
            transition: transform 0.1s;
        }

        /* Ekran Titreme Efekti */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-2px, -2px) rotate(-1deg); }
            40% { transform: translate(2px, 2px) rotate(1deg); }
            60% { transform: translate(-2px, -1px) rotate(0deg); }
            80% { transform: translate(2px, -2px) rotate(-1deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }

        .shake {
            animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .header h1 {
            color: #3498db;
            font-size: 20px;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .header h2 {
            color: #ecf0f1;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #soundBtn {
            position: absolute;
            right: 0;
            top: 25px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #soundBtn:hover { transform: scale(1.1); }

        /* YENİ BAŞLAT BUTONU (KÜÇÜK VE ÜSTTE) */
        #startBtn {
            width: auto;
            background: linear-gradient(135deg, #27ae60, #229954);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.4);
        }

        #startBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(39, 174, 96, 0.6); }

        #startBtn.playing { background: linear-gradient(135deg, #f39c12, #d35400); box-shadow: 0 4px 10px rgba(243, 156, 18, 0.4); }

        #stats {
            display: flex;
            justify-content: space-around;
            background: rgba(20, 30, 40, 0.8);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .stat { text-align: center; z-index: 2; }

        .stat-label {
            color: #3498db;
            font-size: 13px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .stat-value {
            color: #ecf0f1;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: color 0.3s;
        }

        /* Kombo Barı CSS */
        #comboBarContainer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.5);
        }

        #comboBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            box-shadow: 0 0 10px #e74c3c;
            transition: width 0.1s linear;
        }

        #canvasContainer {
            background: #050505;
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9), 0 0 15px rgba(46, 204, 113, 0.2);
            position: relative;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            border-radius: 10px;
        }

        #controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .control-btn {
            background: linear-gradient(145deg, #2c3e50, #1a252f);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .control-btn:active {
            transform: scale(0.92) translateY(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            background: #1a252f;
        }

        .control-btn svg { width: 35px; height: 35px; fill: #3498db; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); }

        #upBtn { grid-column: 2; }
        #leftBtn { grid-column: 1; grid-row: 2; }
        #downBtn { grid-column: 2; grid-row: 2; }
        #rightBtn { grid-column: 3; grid-row: 2; }

        #gameOver {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(20, 30, 40, 0.98);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 1000;
            border: 2px solid #e74c3c;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(231, 76, 60, 0.3);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #gameOver.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        #gameOver h2 { color: #e74c3c; font-size: 36px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 3px; }
        #gameOver p { color: #ecf0f1; font-size: 20px; margin: 10px 0; }
        
        #gameOver button {
            margin-top: 25px; background: linear-gradient(135deg, #3498db, #2980b9); color: white; border: none;
            padding: 15px 40px; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4); transition: transform 0.2s;
        }
        #gameOver button:hover { transform: translateY(-2px); }

        .speed-indicator { position: absolute; top: 10px; right: 15px; font-size: 12px; color: #f39c12; font-weight: bold; z-index: 5; }
        .combo-indicator { position: absolute; top: 10px; left: 15px; font-size: 14px; color: #e74c3c; font-weight: bold; z-index: 5; text-shadow: 0 0 10px #e74c3c; display: none; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="header">
            <h1>MuGöl GAMES</h1>
            <h2>
                🐍 Yılan Oyunu
                <button id="soundBtn" title="Sesi Aç/Kapat">🔊</button>
            </h2>
            <!-- BAŞLAT BUTONU ARTIK ÜSTTE VE DAHA KÜÇÜK -->
            <button id="startBtn">
                <span>▶</span> Başla
            </button>
        </div>

        <div id="stats">
            <div class="stat">
                <div class="stat-label">Puan</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">En Yüksek</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Uzunluk</div>
                <div class="stat-value" id="length">1</div>
            </div>
            <div id="comboBarContainer"><div id="comboBar"></div></div>
        </div>

        <div id="canvasContainer">
            <div class="speed-indicator" id="speedDisplay">Hız: 1x</div>
            <div class="combo-indicator" id="comboDisplay">x1 KOMBO!</div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <div id="controls">
            <button class="control-btn" id="upBtn">
                <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
            </button>
            <button class="control-btn" id="leftBtn">
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <button class="control-btn" id="downBtn">
                <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
            </button>
            <button class="control-btn" id="rightBtn">
                <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
            </button>
        </div>
    </div>

    <div id="gameOver">
        <h2>OYUN BİTTİ!</h2>
        <p>Skorunuz: <b id="finalScore" style="color:#2ecc71;">0</b></p>
        <p>Uzunluk: <b id="finalLength" style="color:#3498db;">0</b></p>
        <button id="restartBtn">Tekrar Oyna</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gameContainer');
        
        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;
        
        let snake =[{x: 10, y: 10}];
        let direction = {x: 1, y: 0};
        let inputQueue =[]; 
        
        let food = {x: 15, y: 15};
        let bonusFood = null; 
        let obstacles =[];
        let lastObstacleScore = 0;
        
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        document.getElementById('highScore').textContent = highScore;
        
        let gameRunning = false;
        let isPaused = false;
        
        let combo = 1;
        let comboTimer = 0;
        const MAX_COMBO_TIME = 60;
        
        let particles = [];
        let floatingTexts =[]; 
        
        let baseTickRate = 160;
        let currentTickRate = 160;
        let lastTime = 0;
        let accumulator = 0;
        let globalTime = 0;
        let animationId;
        
        let audioCtx;
        let soundEnabled = true;
        
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        
        function playSound(type, pitchModifier = 1) {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'eat') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600 * pitchModifier, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200 * pitchModifier, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'bonus') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'die' || type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(type === 'hit' ? 200 : 300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        function triggerShake() {
            container.classList.remove('shake');
            void container.offsetWidth; 
            container.classList.add('shake');
        }
        
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x * GRID_SIZE + GRID_SIZE / 2,
                    y: y * GRID_SIZE + GRID_SIZE / 2,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color
                });
            }
        }

        function createFloatingText(x, y, text, color) {
            floatingTexts.push({
                x: x * GRID_SIZE + GRID_SIZE / 2,
                y: y * GRID_SIZE,
                text: text,
                life: 1.0,
                color: color
            });
        }
        
        function updateEffects() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.04;
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ft.y -= 1; 
                ft.life -= 0.02;
                if (ft.life <= 0) floatingTexts.splice(i, 1);
            }
        }
        
        function drawEffects() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            ctx.font = "bold 16px 'Segoe UI'";
            ctx.textAlign = "center";
            floatingTexts.forEach(ft => {
                ctx.fillStyle = ft.color;
                ctx.globalAlpha = ft.life;
                ctx.fillText(ft.text, ft.x, ft.y);
            });
            ctx.globalAlpha = 1.0;
            ctx.textAlign = "left"; 
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= TILE_COUNT; i++) {
                ctx.beginPath(); ctx.moveTo(i * GRID_SIZE, 0); ctx.lineTo(i * GRID_SIZE, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * GRID_SIZE); ctx.lineTo(canvas.width, i * GRID_SIZE); ctx.stroke();
            }

            ctx.fillStyle = '#7f8c8d';
            obstacles.forEach(obs => {
                let cx = obs.x * GRID_SIZE + GRID_SIZE / 2;
                let cy = obs.y * GRID_SIZE + GRID_SIZE / 2;
                ctx.beginPath();
                ctx.moveTo(cx, cy - 8); ctx.lineTo(cx + 8, cy + 8); ctx.lineTo(cx - 8, cy + 8);
                ctx.fill();
                ctx.fillStyle = '#95a5a6';
                ctx.beginPath(); ctx.arc(cx, cy + 2, 4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#7f8c8d'; 
            });
            
            let pulse = Math.sin(globalTime * 0.01) * 2;
            ctx.shadowBlur = 15; ctx.shadowColor = '#e74c3c';
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath(); ctx.arc(food.x * GRID_SIZE + GRID_SIZE/2, food.y * GRID_SIZE + GRID_SIZE/2, (GRID_SIZE/2 - 2) + (pulse>0?pulse:0), 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#2ecc71'; 
            ctx.beginPath(); ctx.ellipse(food.x * GRID_SIZE + GRID_SIZE/2 + 2, food.y * GRID_SIZE + GRID_SIZE/2 - 6, 3, 5, Math.PI/4, 0, Math.PI*2); ctx.fill();

            if (bonusFood) {
                let bPulse = Math.sin(globalTime * 0.02) * 3;
                ctx.shadowBlur = 20; ctx.shadowColor = '#f1c40f';
                ctx.fillStyle = '#f1c40f';
                ctx.beginPath(); ctx.arc(bonusFood.x * GRID_SIZE + GRID_SIZE/2, bonusFood.y * GRID_SIZE + GRID_SIZE/2, (GRID_SIZE/2 - 1) + (bPulse>0?bPulse:0), 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fillRect(bonusFood.x * GRID_SIZE, bonusFood.y * GRID_SIZE + GRID_SIZE - 4, GRID_SIZE * (bonusFood.timer / 50), 3);
            }
            
            ctx.shadowBlur = 10; ctx.shadowColor = '#27ae60';
            for (let i = 0; i < snake.length; i++) {
                let segment = snake[i];
                let isHead = i === 0;
                
                let sizeRatio = 1;
                if (i > snake.length - 5 && snake.length > 5) {
                    let tailIndex = i - (snake.length - 5);
                    sizeRatio = 1 - (tailIndex * 0.15); 
                }
                let radius = (GRID_SIZE / 2 - 1) * sizeRatio;
                
                ctx.fillStyle = isHead ? '#2ecc71' : '#27ae60';
                
                ctx.beginPath();
                ctx.arc(segment.x * GRID_SIZE + GRID_SIZE/2, segment.y * GRID_SIZE + GRID_SIZE/2, radius, 0, Math.PI * 2);
                ctx.fill();
                
                if (i > 0) {
                    let prev = snake[i - 1];
                    let diffX = segment.x - prev.x;
                    let diffY = segment.y - prev.y;
                    
                    if (Math.abs(diffX) <= 1 && Math.abs(diffY) <= 1) {
                        let prevSizeRatio = 1;
                        if (i-1 > snake.length - 5 && snake.length > 5) {
                            prevSizeRatio = 1 - ((i - 1 - (snake.length - 5)) * 0.15);
                        }
                        let avgRadius = ((radius + (GRID_SIZE/2 - 1)*prevSizeRatio) / 2);
                        
                        ctx.beginPath();
                        if (diffX !== 0) { 
                            ctx.rect(
                                Math.min(segment.x, prev.x) * GRID_SIZE + GRID_SIZE/2,
                                segment.y * GRID_SIZE + GRID_SIZE/2 - avgRadius,
                                GRID_SIZE, avgRadius*2
                            );
                        } else { 
                            ctx.rect(
                                segment.x * GRID_SIZE + GRID_SIZE/2 - avgRadius,
                                Math.min(segment.y, prev.y) * GRID_SIZE + GRID_SIZE/2,
                                avgRadius*2, GRID_SIZE
                            );
                        }
                        ctx.fill();
                    }
                }

                if (isHead) {
                    ctx.shadowBlur = 0; ctx.fillStyle = '#fff';
                    let eOff = 4, eS = 3, pS = 1.5;
                    let e1x = 0, e1y = 0, e2x = 0, e2y = 0;
                    if (direction.x === 1) { e1x=eOff; e1y=-eOff; e2x=eOff; e2y=eOff; }
                    else if (direction.x === -1) { e1x=-eOff; e1y=-eOff; e2x=-eOff; e2y=eOff; }
                    else if (direction.y === 1) { e1x=-eOff; e1y=eOff; e2x=eOff; e2y=eOff; }
                    else if (direction.y === -1) { e1x=-eOff; e1y=-eOff; e2x=eOff; e2y=-eOff; }
                    else { e1x=eOff; e1y=-eOff; e2x=eOff; e2y=eOff; }
                    
                    let cx = segment.x * GRID_SIZE + GRID_SIZE/2, cy = segment.y * GRID_SIZE + GRID_SIZE/2;
                    ctx.beginPath(); ctx.arc(cx+e1x, cy+e1y, eS, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx+e2x, cy+e2y, eS, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath(); ctx.arc(cx+e1x+(direction.x), cy+e1y+(direction.y), pS, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cx+e2x+(direction.x), cy+e2y+(direction.y), pS, 0, Math.PI*2); ctx.fill();
                }
            }
            ctx.shadowBlur = 0;
            
            drawEffects();

            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#f1c40f';
                ctx.font = "bold 30px 'Segoe UI'";
                ctx.textAlign = "center";
                ctx.fillText("DURAKLATILDI", canvas.width / 2, canvas.height / 2);
                ctx.font = "16px 'Segoe UI'";
                ctx.fillStyle = '#ecf0f1';
                ctx.fillText("Devam etmek için Boşluk (Space)", canvas.width / 2, canvas.height / 2 + 30);
                ctx.textAlign = "left"; 
            }
        }
        
        function spawnObstacle() {
            if (obstacles.length > (TILE_COUNT * TILE_COUNT) * 0.05) return;
            
            let valid = false;
            let newObs;
            while (!valid) {
                newObs = { x: Math.floor(Math.random() * TILE_COUNT), y: Math.floor(Math.random() * TILE_COUNT) };
                
                valid = !snake.some(s => s.x === newObs.x && s.y === newObs.y) &&
                        (food.x !== newObs.x || food.y !== newObs.y) &&
                        !(bonusFood && bonusFood.x === newObs.x && bonusFood.y === newObs.y) &&
                        !obstacles.some(o => o.x === newObs.x && o.y === newObs.y);
                
                let distToHead = Math.abs(newObs.x - snake[0].x) + Math.abs(newObs.y - snake[0].y);
                if (distToHead < 4) valid = false;
            }
            obstacles.push(newObs);
            createParticles(newObs.x, newObs.y, '#7f8c8d', 10);
        }

        function updateLogic() {
            if (isPaused) return;

            if (inputQueue.length > 0) direction = inputQueue.shift();
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                gameOver(); return;
            }
            for (let segment of snake) {
                if (segment.x === head.x && segment.y === head.y) { gameOver(); return; }
            }
            for (let obs of obstacles) {
                if (obs.x === head.x && obs.y === head.y) {
                    playSound('hit'); triggerShake(); gameOver(); return;
                }
            }
            
            snake.unshift(head);
            let ate = false;

            if (comboTimer > 0) {
                comboTimer--;
                document.getElementById('comboBar').style.width = (comboTimer / MAX_COMBO_TIME * 100) + "%";
                if (comboTimer === 0) {
                    combo = 1; 
                    document.getElementById('comboDisplay').style.display = 'none';
                    document.getElementById('score').style.color = '#ecf0f1';
                }
            }
            
            if (head.x === food.x && head.y === food.y) {
                let pointsGained = 10 * combo;
                score += pointsGained;
                playSound('eat', 1 + (combo * 0.05)); 
                createParticles(food.x, food.y, '#e74c3c', 15);
                createFloatingText(food.x, food.y, `+${pointsGained}`, '#2ecc71');
                
                combo++;
                comboTimer = MAX_COMBO_TIME;
                let cDisp = document.getElementById('comboDisplay');
                cDisp.textContent = `x${combo} KOMBO!`;
                cDisp.style.display = 'block';
                document.getElementById('score').style.color = '#f1c40f';
                
                updateStats(); placeFood(); ate = true;
                
                if (!bonusFood && Math.random() < 0.10) placeBonusFood();
                
                if (score - lastObstacleScore >= 50) {
                    spawnObstacle();
                    lastObstacleScore = score;
                }
                
                currentTickRate = Math.max(50, baseTickRate - (snake.length * 1.5));
                let speedMult = (baseTickRate / currentTickRate).toFixed(1);
                document.getElementById('speedDisplay').textContent = `Hız: ${speedMult}x`;
            } 
            else if (bonusFood && head.x === bonusFood.x && head.y === bonusFood.y) {
                triggerShake(); 
                let bonusPoints = 50 * combo;
                score += bonusPoints;
                playSound('bonus');
                createParticles(bonusFood.x, bonusFood.y, '#f1c40f', 30);
                createFloatingText(bonusFood.x, bonusFood.y, `+${bonusPoints} BONUS!`, '#f1c40f');
                bonusFood = null;
                
                if (snake.length > 5) snake.splice(-2, 2); 
                updateStats(); ate = true;
            }

            if (!ate) snake.pop(); 
            
            if (bonusFood) {
                bonusFood.timer--;
                if (bonusFood.timer <= 0) bonusFood = null;
            }
        }
        
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }
        
        function placeFood() {
            let valid = false;
            while (!valid) {
                food = { x: Math.floor(Math.random() * TILE_COUNT), y: Math.floor(Math.random() * TILE_COUNT) };
                valid = !snake.some(s => s.x === food.x && s.y === food.y) &&
                        !(bonusFood && food.x === bonusFood.x && food.y === bonusFood.y) &&
                        !obstacles.some(o => o.x === food.x && o.y === food.y);
            }
        }
        
        function placeBonusFood() {
            let valid = false;
            while (!valid) {
                bonusFood = { x: Math.floor(Math.random() * TILE_COUNT), y: Math.floor(Math.random() * TILE_COUNT), timer: 60 };
                valid = !snake.some(s => s.x === bonusFood.x && s.y === bonusFood.y) &&
                        (food.x !== bonusFood.x || food.y !== bonusFood.y) &&
                        !obstacles.some(o => o.x === bonusFood.x && o.y === bonusFood.y);
            }
        }
        
        function gameLoop(timestamp) {
            if (!gameRunning) return;
            
            if (!lastTime) lastTime = timestamp;
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            globalTime += deltaTime;
            
            if (!isPaused) {
                accumulator += deltaTime;
                while (accumulator >= currentTickRate) {
                    updateLogic();
                    accumulator -= currentTickRate;
                }
                updateEffects();
            }
            
            drawGame(); 
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            initAudio();
            if (gameRunning) {
                togglePause();
                return;
            }
            
            snake =[{x: 10, y: 10}];
            direction = {x: 1, y: 0};
            inputQueue =[];
            obstacles =[];
            lastObstacleScore = 0;
            score = 0; combo = 1; comboTimer = 0;
            currentTickRate = baseTickRate;
            bonusFood = null; particles = []; floatingTexts =[];
            lastTime = 0; accumulator = 0; globalTime = 0;
            
            gameRunning = true;
            isPaused = false;
            
            updateStats();
            document.getElementById('speedDisplay').textContent = `Hız: 1.0x`;
            document.getElementById('comboDisplay').style.display = 'none';
            document.getElementById('comboBar').style.width = '0%';
            document.getElementById('startBtn').innerHTML = '<span>⏸</span> Duraklat';
            document.getElementById('startBtn').classList.add('playing');
            
            let goDiv = document.getElementById('gameOver');
            goDiv.classList.remove('show');
            setTimeout(() => goDiv.style.display = 'none', 300);
            
            placeFood();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function togglePause() {
            if (!gameRunning) return;
            isPaused = !isPaused;
            if (isPaused) {
                document.getElementById('startBtn').innerHTML = '<span>▶</span> Devam Et';
                document.getElementById('startBtn').classList.remove('playing');
            } else {
                lastTime = performance.now(); 
                document.getElementById('startBtn').innerHTML = '<span>⏸</span> Duraklat';
                document.getElementById('startBtn').classList.add('playing');
            }
        }
        
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            playSound('die');
            triggerShake();
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLength').textContent = snake.length;
            
            let goDiv = document.getElementById('gameOver');
            goDiv.style.display = 'block';
            setTimeout(() => goDiv.classList.add('show'), 10);
            
            document.getElementById('startBtn').innerHTML = '<span>▶</span> Yeni Oyun';
            document.getElementById('startBtn').classList.remove('playing');
        }
        
        function changeDirection(newDir) {
            initAudio(); 
            if (!gameRunning || isPaused) return;
            
            let lastDir = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : direction;
            if (newDir.x !== 0 && lastDir.x !== 0) return;
            if (newDir.y !== 0 && lastDir.y !== 0) return;
            
            if (inputQueue.length < 2) inputQueue.push(newDir);
        }
        
        document.getElementById('soundBtn').addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
            initAudio();
        });

        document.getElementById('upBtn').addEventListener('click', () => changeDirection({x: 0, y: -1}));
        document.getElementById('downBtn').addEventListener('click', () => changeDirection({x: 0, y: 1}));
        document.getElementById('leftBtn').addEventListener('click', () => changeDirection({x: -1, y: 0}));
        document.getElementById('rightBtn').addEventListener('click', () => changeDirection({x: 1, y: 0}));
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        document.addEventListener('keydown', (e) => {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," ","p","P","Escape"].indexOf(e.key) > -1) e.preventDefault();
            
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': changeDirection({x: 0, y: -1}); break;
                case 'ArrowDown': case 's': case 'S': changeDirection({x: 0, y: 1}); break;
                case 'ArrowLeft': case 'a': case 'A': changeDirection({x: -1, y: 0}); break;
                case 'ArrowRight': case 'd': case 'D': changeDirection({x: 1, y: 0}); break;
                case ' ': case 'p': case 'P': case 'Escape':
                    if (!gameRunning) startGame();
                    else togglePause();
                    break;
            }
        });
        
        drawGame(); 
    </script>
</body>
</html>
