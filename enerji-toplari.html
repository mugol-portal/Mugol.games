<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enerji Tüpleri: PRO v2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0d0e15;
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: radial-gradient(circle at top, #1f2235 0%, #0d0e15 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* Üst Menü */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 15px 5px 15px;
            box-sizing: border-box;
            z-index: 10;
        }

        .action-group {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }
        .icon-btn:active { transform: scale(0.95); }
        
        .btn-undo { color: #feca57; border-color: rgba(254, 202, 87, 0.5); }
        .btn-restart { color: #ff6b6b; border-color: rgba(255, 107, 107, 0.5); }
        .btn-undo:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

        .header-text {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .header-text h1 { margin: 0; font-weight: 900; font-size: 28px; letter-spacing: 1px; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .stats { display: flex; justify-content: center; gap: 20px; margin-top: 5px; color: #a4b0be; font-size: 14px; }
        .stats span { color: #00d2d3; font-weight: bold; font-size: 16px; }

        /* Oyun Alanı */
        #tubeContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
            gap: 15px;
            padding: 10px 20px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .tube-wrapper {
            position: relative;
            padding-top: 40px; 
        }

        .tube {
            width: 54px;
            height: 200px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: none;
            border-radius: 0 0 27px 27px;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            padding-bottom: 5px;
            box-sizing: border-box;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.08) 100%);
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
        }

        .tube::after {
            content: '';
            position: absolute;
            top: 5px; left: 4px;
            width: 8px; height: 90%;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 100%);
            border-radius: 10px;
            pointer-events: none;
            z-index: 5;
        }

        .tube:hover { border-color: rgba(255, 255, 255, 0.5); }
        .tube.selected { border-color: #00d2d3; box-shadow: 0 0 20px rgba(0, 210, 211, 0.3), inset 0 0 10px rgba(0, 210, 211, 0.2); transform: translateY(-5px); }
        
        .tube.completed { border-color: #1dd1a1; box-shadow: 0 0 25px rgba(29, 209, 161, 0.5); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 15px rgba(29,209,161,0.4); } 50% { box-shadow: 0 0 30px rgba(29,209,161,0.8); } 100% { box-shadow: 0 0 15px rgba(29,209,161,0.4); } }

        /* Yanlış Hamle Titreme Efekti */
        .tube.error-shake { animation: shakeAction 0.3s ease; border-color: #ff4757 !important; box-shadow: 0 0 20px rgba(255, 71, 87, 0.5) !important; }
        @keyframes shakeAction {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px) rotate(-3deg); }
            75% { transform: translateX(6px) rotate(3deg); }
        }

        .ball {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            margin-top: 3px;
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.4), inset 5px 5px 10px rgba(255,255,255,0.4), 0 2px 5px rgba(0,0,0,0.5);
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1); /* Hızlandırıldı */
            z-index: 2;
        }

        .tube.selected .ball:last-child {
            transform: translateY(-45px) scale(1.05);
            box-shadow: inset -8px -8px 15px rgba(0,0,0,0.4), inset 5px 5px 10px rgba(255,255,255,0.6), 0 15px 20px rgba(0,0,0,0.6);
            z-index: 10;
        }

        /* Ekran Katmanları */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 14, 21, 0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; backdrop-filter: blur(8px);
            opacity: 1; transition: opacity 0.4s ease;
        }
        .overlay.hidden { opacity: 0; pointer-events: none; }
        
        .overlay h2 { font-weight: 900; font-size: 45px; margin-bottom: 0; text-transform: uppercase; }
        .win-title { color: #feca57; text-shadow: 0 0 20px rgba(254, 202, 87, 0.6); }
        .overlay p { color: #c8d6e5; margin: 10px 0 40px 0; font-size: 18px; text-align: center; }
        
        .btn-large {
            background: linear-gradient(135deg, #1dd1a1, #10ac84);
            color: #fff; border: none; padding: 18px 50px; border-radius: 30px;
            font-family: 'Poppins', sans-serif; font-weight: 900; font-size: 20px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(29, 209, 161, 0.4); transition: 0.2s;
        }
        .btn-large:active { transform: scale(0.95); box-shadow: 0 5px 10px rgba(29, 209, 161, 0.4); }

        #confettiCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 40; }

    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="confettiCanvas"></canvas>

        <!-- Üst Menü -->
        <div class="top-bar">
            <button class="icon-btn" onclick="goBack()">❮ Geri</button>
            <div class="action-group">
                <button class="icon-btn btn-undo" id="undoBtn" onclick="undoMove()">⟲ Geri Al</button>
                <button class="icon-btn btn-restart" onclick="restartLevel()">↻ Yenile</button>
            </div>
        </div>

        <div class="header-text">
            <h1>ENERJİ TÜPLERİ</h1>
            <div class="stats">
                <div>Seviye: <span id="levelText">1</span></div>
                <div>Hamle: <span id="moveText">0</span></div>
            </div>
        </div>

        <div id="tubeContainer"></div>

        <div id="winScreen" class="overlay hidden">
            <h2 class="win-title">KUSURSUZ!</h2>
            <p><span id="finalMoveText" style="color: #00d2d3; font-weight: bold;">0</span> hamlede çözdün.</p>
            <button class="btn-large" onclick="nextLevel()">SONRAKİ SEVİYE ➔</button>
        </div>
    </div>

    <script>
        function goBack() {
            if (window.history.length > 1) window.history.back();
            else alert("Gidilecek önceki sayfa bulunamadı!");
        }

        const PALETTE = ["#ff4757", "#1e90ff", "#2ed573", "#ffa502", "#9b59b6", "#ff6b81", "#00d8d6", "#eccc68"];

        let tubes = [];
        let selectedTubeIndex = null;
        let currentLevel = 1;
        let moves = 0;
        let moveHistory = []; 
        let gameWon = false; // Oyun bittiğinde tıklamaları engeller

        const tubeContainer = document.getElementById("tubeContainer");
        const levelText = document.getElementById("levelText");
        const moveText = document.getElementById("moveText");
        const winScreen = document.getElementById("winScreen");
        const finalMoveText = document.getElementById("finalMoveText");
        const undoBtn = document.getElementById("undoBtn");

        // Konfeti Sistemi
        const canvas = document.getElementById("confettiCanvas");
        const ctx = canvas.getContext("2d");
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = document.getElementById("gameContainer").clientWidth;
            canvas.height = document.getElementById("gameContainer").clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 6 + 4;
                this.speedX = Math.random() * 8 - 4;
                this.speedY = Math.random() * -10 - 5;
                this.gravity = 0.4;
                this.life = 1;
            }
            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.015;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createExplosion(x, y, color, count = 30) {
            for(let i=0; i<count; i++) particles.push(new Particle(x, y, color));
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if(particles[i].life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        function initLevel() {
            levelText.innerText = currentLevel;
            moves = 0;
            updateMoveText();
            moveHistory = [];
            updateUndoBtn();
            selectedTubeIndex = null;
            gameWon = false;
            winScreen.classList.add("hidden");

            let colorCount = Math.min(2 + Math.floor((currentLevel - 1) / 2), PALETTE.length); 
            let emptyCount = 2; 

            generatePuzzle(colorCount, emptyCount);
            render();
        }

        function generatePuzzle(colorCount, emptyCount) {
            tubes = [];
            for (let i = 0; i < colorCount; i++) tubes.push([PALETTE[i], PALETTE[i], PALETTE[i], PALETTE[i]]);
            for (let i = 0; i < emptyCount; i++) tubes.push([]);

            let shuffleMoves = currentLevel * 25; 
            for (let i = 0; i < shuffleMoves; i++) {
                let from = Math.floor(Math.random() * tubes.length);
                let to = Math.floor(Math.random() * tubes.length);

                if (from !== to && tubes[from].length > 0 && tubes[to].length < 4) {
                    tubes[to].push(tubes[from].pop());
                }
            }
            if (checkWinCondition()) generatePuzzle(colorCount, emptyCount); 
        }

        function render() {
            tubeContainer.innerHTML = "";
            tubes.forEach((tubeContent, index) => {
                
                let wrapper = document.createElement("div");
                wrapper.classList.add("tube-wrapper");

                let tubeDiv = document.createElement("div");
                tubeDiv.classList.add("tube");
                
                let isCompleted = tubeContent.length === 4 && tubeContent.every(val => val === tubeContent[0]);
                if (isCompleted) tubeDiv.classList.add("completed");
                else if (selectedTubeIndex === index) tubeDiv.classList.add("selected");

                tubeDiv.onclick = (e) => handleTubeClick(index, e);

                tubeContent.forEach(color => {
                    let ball = document.createElement("div");
                    ball.classList.add("ball");
                    ball.style.background = `radial-gradient(circle at 15px 15px, ${lightenColor(color, 50)}, ${color} 70%, #000 100%)`;
                    tubeDiv.appendChild(ball);
                });

                wrapper.appendChild(tubeDiv);
                tubeContainer.appendChild(wrapper);
            });
        }

        function handleTubeClick(index, event) {
            if(gameWon) return; // Oyun bittiyse tıklama iptal

            let clickedTube = tubes[index];
            let isCompleted = clickedTube.length === 4 && clickedTube.every(val => val === clickedTube[0]);
            
            // Eğer tamamlanmış bir tüpe tıklandıysa ve o tüp seçili değilse hata ver (titret)
            if (isCompleted && selectedTubeIndex !== index) {
                shakeTube(index);
                return; 
            }

            if (selectedTubeIndex === null) {
                if (clickedTube.length > 0) {
                    selectedTubeIndex = index;
                    render();
                }
            } 
            else {
                // Seçili olan tüpe tekrar tıklanırsa seçimi kaldır
                if (selectedTubeIndex === index) {
                    selectedTubeIndex = null;
                    render();
                    return;
                }

                let sourceTube = tubes[selectedTubeIndex];
                let targetTube = tubes[index];

                let topToMove = sourceTube[sourceTube.length - 1];
                let targetTopBall = targetTube[targetTube.length - 1];

                // Taşıma Kuralı: Hedef tüp dolmamış olmalı ( < 4 )
                // VE (Hedef tüp boş olmalı YADA hedefteki en üst top ile gönderilen top aynı renk olmalı)
                let isMoveValid = targetTube.length < 4 && (targetTube.length === 0 || targetTopBall === topToMove);

                if (isMoveValid) {
                    // Geçerli Hamle: Anında uygulanır (0 donma)
                    moveHistory.push({ from: selectedTubeIndex, to: index });
                    updateUndoBtn();
                    
                    targetTube.push(sourceTube.pop());
                    selectedTubeIndex = null;
                    moves++;
                    updateMoveText();
                    render();

                    // Tamamlanan tüpte konfeti patlat
                    if(targetTube.length === 4 && targetTube.every(v => v === targetTube[0])) {
                        let rect = event.currentTarget.getBoundingClientRect();
                        createExplosion(rect.left + rect.width/2, rect.top + 20, targetTube[0], 20);
                    }

                    // Kazanma Kontrolü
                    if (checkWinCondition()) {
                        gameWon = true;
                        triggerWin();
                    }
                } 
                else {
                    // Geçersiz Hamle (Renkler farklı veya tüp dolu)
                    shakeTube(index); // Tüpü kırmızı yakıp titret
                    
                    // Akıcılığı bozmamak için seçimi bu yeni tıkladığı tüpe kaydır (eğer boş değilse)
                    if (clickedTube.length > 0) {
                        selectedTubeIndex = index;
                        render();
                    }
                }
            }
        }

        // Kırmızı renkte titretme efekti fonksiyonu
        function shakeTube(index) {
            let tubeElements = document.querySelectorAll('.tube');
            if(tubeElements[index]) {
                tubeElements[index].classList.remove('error-shake');
                // Tarayıcının animasyonu baştan oynatması için ufak bir reflow
                void tubeElements[index].offsetWidth; 
                tubeElements[index].classList.add('error-shake');
            }
        }

        function undoMove() {
            if(moveHistory.length === 0 || gameWon) return;
            
            let lastMove = moveHistory.pop();
            let sourceTube = tubes[lastMove.to]; 
            let originalTube = tubes[lastMove.from]; 

            originalTube.push(sourceTube.pop());
            
            selectedTubeIndex = null;
            moves--;
            updateMoveText();
            updateUndoBtn();
            render();
        }

        function updateUndoBtn() {
            undoBtn.disabled = moveHistory.length === 0;
        }

        function updateMoveText() {
            moveText.innerText = moves;
        }

        function checkWinCondition() {
            for (let tube of tubes) {
                if (tube.length > 0 && tube.length < 4) return false;
                if (tube.length === 4 && !tube.every(val => val === tube[0])) return false;
            }
            return true;
        }

        function triggerWin() {
            finalMoveText.innerText = moves;
            
            for(let i=0; i<5; i++) {
                setTimeout(() => {
                    createExplosion(Math.random() * canvas.width, canvas.height/2 + Math.random()*100, PALETTE[Math.floor(Math.random()*PALETTE.length)], 40);
                }, i * 200);
            }

            setTimeout(() => { winScreen.classList.remove("hidden"); }, 800);
        }

        function restartLevel() {
            if(confirm("Tıkandın mı? Bölümü baştan başlatmak istiyor musun?")) {
                initLevel();
            }
        }

        function nextLevel() {
            currentLevel++;
            initLevel();
        }

        function lightenColor(color, percent) {
            let num = parseInt(color.replace("#",""), 16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) + amt, B = (num >> 8 & 0x00FF) + amt, G = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (B<255?B<1?0:B:255)*0x100 + (G<255?G<1?0:G:255)).toString(16).slice(1);
        }

        initLevel();

    </script>
</body>
</html>
