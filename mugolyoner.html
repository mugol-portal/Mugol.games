<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuGölyoner</title>
    <!-- Ekran görüntüsü almak için kütüphane -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* PREMIUM ANİMASYONLU ARKAPLAN */
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        body { 
            background: linear-gradient(-45deg, #020024, #090979, #002a4d, #000000);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            color: white; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }

        .screen { display: none; width: 100%; min-height: 100vh; flex-direction: column; }
        .screen.active { display: flex; animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* --- ÜST MENÜ --- */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 15px; background: rgba(0, 0, 20, 0.85);
            backdrop-filter: blur(20px); z-index: 10;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3); flex-wrap: nowrap; gap: 5px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        .top-bar-right { display: flex; gap: 5px; align-items: center; }

        .action-btn {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(0,0,0,0.5));
            border: 1px solid #00d4ff; color: white; padding: 6px 12px; border-radius: 20px;
            font-weight: 800; cursor: pointer; font-size: 0.8rem;
            transition: all 0.3s ease; display: flex; align-items: center; gap: 4px; white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }
        .action-btn:hover { background: #00d4ff; color: #000033; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,212,255,0.6); }
        .sound-btn { border-color: #d4af37; color: #d4af37; }
        .sound-btn:hover { background: #d4af37; color: #000000; box-shadow: 0 8px 15px rgba(212, 175, 55, 0.6); }

        .title-text { color: #d4af37; font-weight: 900; font-size: 1.1rem; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 0 10px rgba(212, 175, 55, 0.6); text-align: center; flex: 1; overflow: hidden; text-overflow: ellipsis; }

        .kasa-badge {
            background: linear-gradient(145deg, #27ae60, #1e5a2d);
            border: 1px solid #2ecc71; color: white; padding: 6px 12px; border-radius: 20px;
            font-weight: 900; font-size: 0.85rem; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            white-space: nowrap; text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* --- ANA MENÜ --- */
        #start-screen { justify-content: center; align-items: center; padding: 15px; }
        
        .glass-card {
            background: rgba(10, 10, 25, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 35px 25px; text-align: center; max-width: 650px; width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 0 25px rgba(212, 175, 55, 0.1);
            position: relative;
        }

        .crown-icon { font-size: 2.5rem; margin-bottom: -10px; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.8)); animation: float 3s ease-in-out infinite; display: inline-block;}
        @keyframes float { 0% {transform: translateY(0px);} 50% {transform: translateY(-8px);} 100% {transform: translateY(0px);} }
        
        .logo-title {
            color: #d4af37; font-size: clamp(2rem, 8vw, 3.8rem); font-weight: 900;
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.9), 0 0 20px rgba(212, 175, 55, 0.6);
            line-height: 1.1;
        }
        
        .subtitle { margin-bottom: 30px; font-size: 1.05rem; color: #a0c4ff; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;}
        
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 15px; margin-bottom: 25px;}
        
        .category-btn {
            background: linear-gradient(145deg, rgba(15, 12, 41, 0.8), rgba(48, 43, 99, 0.8));
            border: 1px solid rgba(0, 212, 255, 0.3); border-bottom: 3px solid #00d4ff;
            color: white; padding: 15px 10px;
            border-radius: 20px; cursor: pointer;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        }
        
        .category-btn:hover { 
            background: linear-gradient(145deg, rgba(0, 212, 255, 0.9), rgba(0, 114, 255, 0.9)); 
            border-color: #ffffff; color: #000033; transform: translateY(-5px) scale(1.05); 
            box-shadow: 0 12px 25px rgba(0, 212, 255, 0.5); 
        }
        
        .cat-icon { font-size: 2rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); transition: transform 0.3s;}
        .category-btn:hover .cat-icon { transform: scale(1.2); }
        .cat-text { font-size: 0.9rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; line-height: 1.2; word-wrap: break-word; width:100%;}

        .btn-mixed { 
            border-bottom-color: #d4af37; border-color: rgba(212, 175, 55, 0.4);
            background: linear-gradient(145deg, rgba(75, 56, 0, 0.8), rgba(26, 19, 0, 0.8)); 
        }
        .btn-mixed:hover { background: linear-gradient(145deg, #d4af37, #ffdf00); }

        .control-panel { 
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px;
            display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; border: 1px solid rgba(255,255,255,0.1);
        }
        
        .cp-btn { 
            background: transparent; padding: 10px 20px; border-radius: 15px; 
            font-weight: 800; font-size: 0.95rem; cursor: pointer; transition: 0.3s; 
            display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .btn-about { border: 2px solid #00d4ff; color: #00d4ff; }
        .btn-about:hover { background: #00d4ff; color: #000; box-shadow: 0 5px 15px rgba(0,212,255,0.5); transform: translateY(-2px);}

        .btn-kasa { border: 2px solid #2ecc71; color: #2ecc71; }
        .btn-kasa:hover { background: #2ecc71; color: #000; box-shadow: 0 5px 15px rgba(46,204,113,0.5); transform: translateY(-2px);}

        .btn-exit { border: 2px solid #ff4444; color: #ff4444; }
        .btn-exit:hover { background: #ff4444; color: #fff; box-shadow: 0 5px 15px rgba(255,68,68,0.5); transform: translateY(-2px);}

        /* --- OYUN EKRANI & ÖDÜL AĞACI --- */
        .prize-container { width: 100%; background: rgba(0, 0, 15, 0.95); border-bottom: 2px solid #d4af37; padding: 8px; overflow-x: auto; white-space: nowrap; box-shadow: 0 5px 15px rgba(0,0,0,0.8); z-index: 5; }
        .prize-ladder { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 10px; padding: 0 5px; align-items: center; }
        .prize-item { color: #d4af37; padding: 6px 12px; border-radius: 15px; font-weight: 900; font-size: 0.9rem; transition: 0.4s; opacity: 0.6; }
        .prize-item.active { background: linear-gradient(145deg, #d4af37, #ffdf00); color: #000; box-shadow: 0 0 15px #d4af37; transform: scale(1.1); opacity: 1; margin: 0 8px; border: 1px solid #fff; }
        .prize-item.safe { color: #ffffff; opacity: 0.9; text-shadow: 0 0 5px #fff; }

        .main-game { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; padding: 20px 15px; max-width: 800px; margin: 0 auto; width: 100%; }

        .game-header-info { width: 100%; margin-bottom: 20px; }
        .joker-timer-row { display: flex; justify-content: space-between; align-items: center; padding: 0; gap: 10px; flex-wrap: nowrap; }
        
        .jokers { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; justify-content: center; }
        .joker-btn {
            background: linear-gradient(145deg, #111, #222); border: 2px solid #d4af37; color: #d4af37;
            padding: 6px 10px; border-radius: 20px; font-weight: 900; font-size: 0.75rem; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6); transition: 0.3s; text-transform: uppercase;
        }
        .joker-btn:hover:not(:disabled) { background: #d4af37; color: #000; box-shadow: 0 0 15px rgba(212, 175, 55, 0.6); transform: translateY(-2px); }
        .joker-btn:active { transform: scale(0.95); }
        .joker-btn:disabled { background: #222; border-color: #444; color: #555; cursor: not-allowed; box-shadow: none; opacity: 0.5; }
        
        .joker-buy { background: linear-gradient(145deg, #1a4a28, #112b18) !important; border-color: #2ecc71 !important; color: #2ecc71 !important; opacity: 1 !important; cursor: pointer !important; }
        .joker-buy:hover:not(:disabled) { background: #2ecc71 !important; color: #000 !important; box-shadow: 0 0 15px rgba(46, 204, 113, 0.6) !important; }

        .timer-circle {
            background: radial-gradient(circle, #001a4d, #000); border: 3px solid #00d4ff; color: #00d4ff;
            width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 1.3rem; font-weight: 900; box-shadow: 0 0 15px rgba(0, 212, 255, 0.6); flex-shrink: 0;
            text-shadow: 0 0 10px #00d4ff;
        }
        .timer-warning { border-color: #ff4444; color: #ff4444; box-shadow: 0 0 15px #ff4444; text-shadow: 0 0 10px #ff4444; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .progress-bar-container { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #00d4ff, #0072ff); width: 100%; transition: width 1s linear, background-color 0.5s ease; box-shadow: 0 0 10px #00d4ff; }

        .animate-up { animation: slideUpFade 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .capture-container { width: 100%; position: relative; background: transparent; margin: 0 auto; }
        .capture-watermark { display: none; width: 100%; text-align: center; font-size: 1.1rem; font-weight: 900; color: rgba(255,255,255,0.4); letter-spacing: 2px; margin-top: 20px; }
        
        .question-box {
            background: linear-gradient(160deg, #07001f 0%, #000000 100%); 
            border: 2px solid #d4af37; border-radius: 20px; 
            padding: 25px 15px; text-align: center; font-size: 1.2rem; font-weight: 900;
            margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.9), inset 0 0 25px rgba(212, 175, 55, 0.15);
            color: #ffffff; position: relative; word-wrap: break-word; overflow-wrap: break-word; line-height: 1.4;
        }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; }

        .option-btn {
            display: flex; align-items: stretch; 
            background: linear-gradient(90deg, #000514, #001f3f); 
            border: 2px solid #00d4ff; border-radius: 30px; cursor: pointer; color: white; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.6); 
            transition: all 0.2s ease; min-height: 55px; height: auto; overflow: hidden; 
        }
        .option-btn:active { transform: scale(0.97); }

        .letter-box {
            display: flex; align-items: center; justify-content: center; width: 50px; 
            background: transparent; border-right: 1px solid rgba(0, 212, 255, 0.3);
            color: #d4af37; font-weight: 900; font-size: 1.3rem; flex-shrink: 0; text-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
        }

        .text-box { display: flex; align-items: center; flex: 1; padding: 10px 15px; min-width: 0; }
        .text-box .text { word-wrap: break-word; overflow-wrap: break-word; white-space: normal; font-size: 1.05rem; font-weight: 700; line-height: 1.3; text-align: left; color: #ffffff; }

        .option-btn.hidden { visibility: hidden; pointer-events: none; }
        .option-btn.selected { background: linear-gradient(90deg, #d35400, #e67e22); border-color: #ffdf00; box-shadow: 0 0 20px rgba(255, 223, 0, 0.4); }
        .option-btn.selected .letter-box { color: white; border-color: rgba(255,255,255,0.3); text-shadow: none; }
        .option-btn.correct { background: linear-gradient(90deg, #1e5a2d, #27ae60); border-color: #2ecc71; box-shadow: 0 0 20px rgba(46, 204, 113, 0.6); animation: blinkCorrect 0.5s 4; }
        .option-btn.correct .letter-box { color: white; border-color: rgba(255,255,255,0.3); text-shadow: none; }
        .option-btn.wrong { background: linear-gradient(90deg, #7a1008, #c0392b); border-color: #e74c3c; box-shadow: 0 0 20px rgba(231, 76, 60, 0.6); animation: shake 0.4s; }
        .option-btn.wrong .letter-box { color: white; border-color: rgba(255,255,255,0.3); text-shadow: none; }

        @keyframes blinkCorrect { 50% { filter: brightness(1.5); } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        .capturing-mode { background-color: #02002e !important; padding: 30px 15px 40px 15px !important; box-sizing: border-box !important; }
        .capturing-mode .question-box { background-color: #05001a !important; background-image: none !important; box-shadow: none !important; border: 2px solid #d4af37 !important; color: #ffffff !important; transform: none !important; }
        .capturing-mode .option-btn { background-color: #000033 !important; background-image: none !important; box-shadow: none !important; transform: none !important; height: auto !important; border: 2px solid #00d4ff !important; }
        .capturing-mode .letter-box { background-color: #001a4d !important; color: #d4af37 !important; border-right: 2px solid #00d4ff !important; text-shadow: none !important; }
        .capturing-mode .text-box, .capturing-mode .text { color: #ffffff !important; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 10, 0.95); backdrop-filter: blur(5px); z-index: 40; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: linear-gradient(160deg, #1a0b2e, #0a001a); border-radius: 20px; padding: 30px 20px; width: 100%; max-width: 400px; text-align: center; }
        
        .audience-content { border: 2px solid #b83b5e; box-shadow: 0 10px 30px rgba(184, 59, 94, 0.4); }
        .audience-content h3 { color: #f08a5d; margin-bottom: 20px; font-size: 1.4rem; font-weight: 900; }
        .chart-container { display: flex; justify-content: space-around; align-items: flex-end; height: 150px; margin-bottom: 20px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .chart-bar-group { display: flex; flex-direction: column; align-items: center; width: 40px; }
        .chart-bar { width: 100%; background: linear-gradient(to top, #6a2c70, #b83b5e); border-radius: 5px 5px 0 0; transition: height 1s ease; box-shadow: 0 0 10px rgba(184, 59, 94, 0.5); height: 0%; }
        .chart-label { margin-top: 10px; font-weight: 900; color: white; font-size: 1.1rem; }
        .chart-percent { font-size: 0.85rem; margin-bottom: 5px; color: #f9ed69; font-weight: 900; }
        .btn-close-audience { background: linear-gradient(145deg, #e74c3c, #c0392b); color: white; border: 2px solid #ff7675; padding: 10px 20px; border-radius: 25px; font-weight: 900; cursor: pointer; transition: 0.3s; width: 100%; }
        
        .about-content { border: 2px solid #00d4ff; box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4); color: white; }
        .about-content h3 { color: #00d4ff; margin-bottom: 20px; font-size: 1.5rem; font-weight: 900; }
        .about-stats { margin-bottom: 25px; font-size: 1.1rem; line-height: 1.6; text-align: left; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; border: 1px solid rgba(0, 212, 255, 0.3); max-height: 300px; overflow-y: auto;}
        .about-stats strong { color: #d4af37; }
        .btn-close-about { background: linear-gradient(145deg, #00d4ff, #0099cc); color: #000033; border: none; padding: 10px 20px; border-radius: 25px; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.3s; width: 100%; box-shadow: 0 5px 15px rgba(0,212,255,0.4); }
        .btn-close-about:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,212,255,0.6); }

        #game-over { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 15, 0.95); backdrop-filter: blur(10px); z-index: 20; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        #game-over h1 { color: #ffaa00; margin-bottom: 10px; font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; text-shadow: 0 0 20px rgba(255,170,0,0.6); }
        #end-reason { color: white; font-size: 1.2rem; margin-bottom: 15px; font-weight: 600; }
        #game-over button { padding: 12px 30px; font-size: 1.1rem; cursor: pointer; background: linear-gradient(145deg, #00d4ff, #0099cc); color: #000033; border: none; border-radius: 30px; font-weight: 900; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,212,255,0.4); }

        @media (min-width: 768px) {
            #screen-game { flex-direction: row; position: relative; }
            .top-bar-game { position: absolute; top: 0; left: 0; width: 100%; background: transparent; border:none; box-shadow: none; }
            .prize-container { width: 280px; min-height: 100vh; border-bottom: none; border-left: 3px solid rgba(212, 175, 55, 0.4); background: rgba(0,0,15,0.8); padding: 80px 20px 40px; order: 2; overflow-y: auto; white-space: normal; }
            .prize-ladder { flex-direction: column-reverse; height: 100%; justify-content: space-evenly; align-items: stretch; text-align: right; }
            .main-game { order: 1; padding: 90px 50px 40px; }
            .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
            .jokers { justify-content: flex-start; }
        }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <div class="top-bar" style="position: absolute; top: 0; width: 100%; background: transparent; border:none; box-shadow:none; justify-content: space-between;">
            <div class="kasa-badge" id="kasa-main">💰 Kasa: 0 TL</div>
            <button class="action-btn sound-btn" id="sound-toggle-main" onclick="toggleSound()">🔊 Ses Açık</button>
        </div>
        
        <div class="glass-card">
            <div class="crown-icon">👑</div>
            <h1 class="logo-title">MUGÖLYONER</h1>
            <p class="subtitle">Milyoner Bilgi Yarışması</p>
            
            <div class="category-grid" id="category-buttons">
                <!-- Dinamik Kategoriler -->
            </div>
            
            <div class="control-panel">
                <button class="cp-btn btn-about" onclick="hakkindaGoster()">ℹ️ Hakkında</button>
                <button class="cp-btn btn-kasa" onclick="kasaIndir()">💾 Kasa İndir</button>
                <button class="cp-btn btn-kasa" onclick="document.getElementById('kasa-upload').click()">📂 Kasa Yükle</button>
                <button class="cp-btn btn-exit" onclick="uyarKapat()">🚪 Çıkış</button>
                <input type="file" id="kasa-upload" style="display:none;" accept=".mgy" onchange="kasaYukle(event)">
            </div>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="top-bar top-bar-game">
            <button class="action-btn" onclick="anaMenuyeDon()">◀ Geri</button>
            <span class="title-text" id="current-category-label">Karışık</span>
            <div class="top-bar-right">
                <div class="kasa-badge" id="kasa-game">💰 0 TL</div>
                <button class="action-btn sound-btn" id="sound-toggle-game" onclick="toggleSound()">🔊</button>
                <button class="action-btn" onclick="soruyuIndir()">📸 Paylaş</button>
            </div>
        </div>

        <div class="prize-container">
            <div class="prize-ladder" id="prize-ladder"></div>
        </div>

        <div class="main-game">
            <div class="game-header-info">
                <div class="joker-timer-row">
                    <div class="jokers">
                        <button class="joker-btn" id="btn-joker-50" onclick="joker50Kullan()">%50 Joker</button>
                        <button class="joker-btn" id="btn-joker-degistir" onclick="jokerDegistirKullan()">🔄 Değiştir</button>
                        <button class="joker-btn" id="btn-joker-cift" onclick="jokerCiftCevapKullan()">x2 Cevap</button>
                        <button class="joker-btn audience-btn" id="btn-joker-seyirci" onclick="jokerSeyirciKullan()">👥 Seyirci</button>
                    </div>
                    <div class="timer-circle" id="timer">60</div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>

            <div id="capture-area" class="capture-container">
                <div id="question-box" class="question-box animate-up"><span id="q-text-span">Soru Yükleniyor...</span></div>
                
                <div class="options-grid animate-up" id="options-grid" style="animation-delay: 0.1s;">
                    <div class="option-btn" onclick="checkAnswer('A')" id="btn-A">
                        <div class="letter-box">A:</div>
                        <div class="text-box"><span class="text"></span></div>
                    </div>
                    <div class="option-btn" onclick="checkAnswer('B')" id="btn-B">
                        <div class="letter-box">B:</div>
                        <div class="text-box"><span class="text"></span></div>
                    </div>
                    <div class="option-btn" onclick="checkAnswer('C')" id="btn-C">
                        <div class="letter-box">C:</div>
                        <div class="text-box"><span class="text"></span></div>
                    </div>

        function kasaGuncelle(miktar) {

        const YEDEK_SECRET = "MuGolyoner_Ozel_Sifre_2024";

        function kasaIndir() {
            sesCal('tiklama'); let hash = btoa(kasaParasi + YEDEK_SECRET); let data = JSON.stringify({ miktar: kasaParasi, guvenlik: hash });
            let blob = new Blob([data], { type: "text/plain" }); let url = window.URL.createObjectURL(blob);
            let a = document.createElement("a"); a.href = url; a.download = "kasa_yedegi.mgy"; a.click(); window.URL.revokeObjectURL(url);
            setTimeout(() => { alert("Kasa yedeğiniz indirildi!"); }, 500);

        function kasaYukle(event) {
            let file = event.target.files[0]; if (!file) return; let reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let data = JSON.parse(e.target.result); let checkHash = btoa(data.miktar + YEDEK_SECRET);
                    if (data.guvenlik === checkHash && typeof data.miktar === "number") {

                } catch (err) { sesCal('yanlis'); alert("❌ HATA: Geçersiz dosya formatı."); } event.target.value = ""; 
            }; reader.readAsText(file);
        }

        function setJokerButtonState(type, btnId, defaultText) {

        let sesAcik = true; const AudioContext = window.AudioContext || window.webkitAudioContext; const sesContext = new AudioContext();

        function toggleSound() {
            sesAcik = !sesAcik;
            document.getElementById('sound-toggle-main').innerText = sesAcik ? "🔊 Ses Açık" : "🔇 Ses Kapalı";
            document.getElementById('sound-toggle-game').innerText = sesAcik ? "🔊" : "🔇";
        }

        function sesCal(tur) {
            if (!sesAcik) return; if (sesContext.state === 'suspended') sesContext.resume();
            const osc = sesContext.createOscillator(), gainNode = sesContext.createGain();
            osc.connect(gainNode); gainNode.connect(sesContext.destination); const suan = sesContext.currentTime;

            if (tur === 'tiklama') { osc.type = 'triangle'; osc.frequency.setValueAtTime(400, suan); osc.frequency.exponentialRampToValueAtTime(600, suan + 0.1); gainNode.gain.setValueAtTime(0.3, suan); gainNode.gain.exponentialRampToValueAtTime(0.01, suan + 0.1); osc.start(suan); osc.stop(suan + 0.1); } 
            else if (tur === 'dogru') { osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, suan); osc.frequency.setValueAtTime(659.25, suan + 0.1); osc.frequency.setValueAtTime(1046.50, suan + 0.3); gainNode.gain.setValueAtTime(0.3, suan); gainNode.gain.linearRampToValueAtTime(0, suan + 0.6); osc.start(suan); osc.stop(suan + 0.6); } 
            else if (tur === 'yanlis') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, suan); osc.frequency.exponentialRampToValueAtTime(100, suan + 0.5); gainNode.gain.setValueAtTime(0.3, suan); gainNode.gain.linearRampToValueAtTime(0, suan + 0.5); osc.start(suan); osc.stop(suan + 0.5); }
        }

        function hakkindaGoster() {

                let katSayilari = {}; window.tumSorular.forEach(s => { katSayilari[s.kategori] = (katSayilari[s.kategori] || 0) + 1; });
                let katAnahtarlar = Object.keys(katSayilari).sort();

            } document.getElementById("about-modal").style.display = "flex";

        function hakkindaKapat() { sesCal('tiklama'); document.getElementById("about-modal").style.display = "none"; }

        function kategorileriYukle() {
            const btnContainer = document.getElementById("category-buttons"); btnContainer.innerHTML = "";
            if(!window.tumSorular || window.tumSorular.length === 0) { btnContainer.innerHTML = "<p>Sorular yüklenemedi!</p>"; return; }
            
            // YENİ BİR KATEGORİ EKLERSENİZ BURAYA İKONUNU EKLEYEBİLİRSİNİZ.

        function arkaplanAyarla(kategori) {
            let gradient = "linear-gradient(-45deg, #020024, #090979, #002a4d, #000000)"; 
            
            // YENİ KATEGORİNİZE ÖZEL ARKA PLAN RENGİ İSTERSENİZ BURAYA EKLEYİN. 
            // Eklemezseniz standart lacivert arka plan çıkar. Oyun asla bozulmaz.
            if (kategori === "Bilim") gradient = "linear-gradient(-45deg, #1a0033, #4b0082, #2a004d, #000000)";
            else if (kategori === "Tarih") gradient = "linear-gradient(-45deg, #331a00, #5c2e00, #8b4513, #1a0d00)";
            else if (kategori === "Spor") gradient = "linear-gradient(-45deg, #002200, #004d00, #001a00, #000000)";
            else if (kategori === "Coğrafya") gradient = "linear-gradient(-45deg, #002626, #004d4d, #001a1a, #000000)";
            else if (kategori === "Sinema / TV") gradient = "linear-gradient(-45deg, #330000, #660000, #1a0000, #000000)";
            else if (kategori === "Din / İslamiyet") gradient = "linear-gradient(-45deg, #002b18, #004d2c, #001a0f, #000000)"; 
            else if (kategori === "Önemli Yerler") gradient = "linear-gradient(-45deg, #2b1d0f, #5c4033, #8b5a2b, #000000)"; 

            document.body.style.background = gradient; document.body.style.backgroundSize = "400% 400%";
        }

        function oyunuBaslat(kategori) {
            sesCal('tiklama'); seciliKategori = kategori; suankiSeviye = 1; arkaplanAyarla(kategori);
            jokersUsed = { '50': false, 'degistir': false, 'cift': false, 'seyirci': false }; jokerButonlariniGuncelle();

            document.body.style.background = "linear-gradient(-45deg, #020024, #090979, #002a4d, #000000)"; document.body.style.backgroundSize = "400% 400%";

        function odulAgaciniOlustur() {
            const ladderDiv = document.getElementById("prize-ladder"); ladderDiv.innerHTML = "";
            for (let i = 0; i < oduller.length; i++) {
                let div = document.createElement("div"); div.className = "prize-item" + (i === 1 || i === 6 || i === 11 ? " safe" : "");

        function sureyiBaslat() {
            clearInterval(zamanlayiciInterval); sure = 60; 
            let timerEl = document.getElementById("timer"); let barEl = document.getElementById("progress-bar");
            timerEl.innerText = sure; timerEl.classList.remove("timer-warning"); barEl.style.width = "100%"; barEl.style.background = "linear-gradient(90deg, #00d4ff, #0072ff)";
            zamanlayiciInterval = setInterval(() => {

                if (sure <= 10) { timerEl.classList.add("timer-warning"); barEl.style.background = "linear-gradient(90deg, #ff4444, #cc0000)"; }

        function AnimasyonlariTetikle() {
            let qBox = document.getElementById('question-box'), oGrid = document.querySelector('.options-grid');
            qBox.classList.remove('animate-up'); oGrid.classList.remove('animate-up'); void qBox.offsetWidth; qBox.classList.add('animate-up'); oGrid.classList.add('animate-up');

        function soruyuYukle(jokerKullanildiMi = false) {
            tiklanabilir = true; ciftCevapAktif = false; 
            jokersThisQuestion = { '50': false, 'degistir': false, 'cift': false, 'seyirci': false }; jokerButonlariniGuncelle();
            document.querySelectorAll('.option-btn').forEach(btn => { btn.classList.remove('selected', 'correct', 'wrong', 'hidden'); });
            document.querySelectorAll('.prize-item').forEach(item => item.classList.remove('active'));
            
            let aktifOdulUI = document.getElementById(`prize-${suankiSeviye}`);
            if(aktifOdulUI) { aktifOdulUI.classList.add('active'); if (window.innerWidth < 768) aktifOdulUI.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" }); }

            let havuz = window.tumSorular; if (seciliKategori !== "Karışık") { havuz = window.tumSorular.filter(s => s.kategori === seciliKategori); }
            let sorulmamislar = havuz.filter(s => !sorulmusSorular.includes(s.soru));
            if (sorulmamislar.length === 0) { 
                let havuzSorulari = havuz.map(s => s.soru); sorulmusSorular = sorulmusSorular.filter(q => !havuzSorulari.includes(q)); kaydetSorulmus(); sorulmamislar = havuz;

            document.querySelector('#btn-D .text').innerText = aktifSoru.secenekler.D;

        function joker50Kullan() {
            if (!tiklanabilir || jokersThisQuestion['50']) return;
            if (jokersUsed['50']) { if (kasaParasi < JOKER_PRICES['50']) { alert("Kasa Yetersiz!"); return; } kasaGuncelle(-JOKER_PRICES['50']); }

        function jokerSeyirciKullan() {

            sesCal('tiklama'); jokersUsed['seyirci'] = true; jokersThisQuestion['seyirci'] = true; jokerButonlariniGuncelle(); clearInterval(zamanlayiciInterval); 
            let dCevap = aktifSoru.dogruCevap, secenekler = ['A', 'B', 'C', 'D'], yuzdeler = {A:0, B:0, C:0, D:0};

            yuzdeler[dCevap] = Math.floor(Math.random() * 15) + dogruIhtimali; let kalan = 100 - yuzdeler[dCevap];

        function checkAnswer(secilenSik) {

        function oyunuBitir(kazandi, sebepYazisi) {

            else { document.getElementById('end-message').innerText = "ELENDİNİZ."; kazanilanOdulStr = suankiSeviye > 7 ? oduller[6] : (suankiSeviye > 2 ? oduller[1] : "0 TL"); document.getElementById('final-prize').innerText = `Garanti Edilen Ödül: ${kazanilanOdulStr}`; }
            let eklenecekMiktar = parseInt(kazanilanOdulStr.replace(/[^0-9]/g, '')) || 0;
            if (eklenecekMiktar > 0) { kasaGuncelle(eklenecekMiktar); document.getElementById('kasa-eklenen').innerText = `Kasanıza Eklendi: +${eklenecekMiktar.toLocaleString('tr-TR')} TL`; } 
            else { document.getElementById('kasa-eklenen').innerText = ""; }
        }

        function soruyuIndir() {
            let captureArea = document.getElementById('capture-area'), watermark = document.getElementById('watermark'), qBox = document.getElementById('question-box'), oGrid = document.getElementById('options-grid');
            let mevcutGenislik = captureArea.offsetWidth; captureArea.style.width = mevcutGenislik + "px"; qBox.classList.remove('animate-up'); oGrid.classList.remove('animate-up');
            captureArea.classList.add('capturing-mode'); watermark.style.display = 'block'; 
            html2canvas(captureArea, { 
                backgroundColor: "#02002e", scale: 2, logging: false, useCORS: true,
                onclone: function(clonedDoc) { let clonedQBox = clonedDoc.getElementById('q-text-span'); if(clonedQBox) clonedQBox.style.color = '#ffffff'; let clonedTexts = clonedDoc.querySelectorAll('.text'); clonedTexts.forEach(t => t.style.color = '#ffffff'); }
            }).then(canvas => {
                captureArea.classList.remove('capturing-mode'); captureArea.style.width = ""; watermark.style.display = 'none'; qBox.classList.add('animate-up'); oGrid.classList.add('animate-up');
                let link = document.createElement('a'); link.download = `Soru_${suankiSeviye}.png`; link.href = canvas.toDataURL("image/png"); link.click();
            });
        }

        window.onload = () => { setTimeout(kategorileriYukle, 300); kasaGuncelle(0); };
    </script>
</body>
</html>
