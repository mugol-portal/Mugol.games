<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#030712">
    <title>Kelime Puzzle - Hesap Kayıtlı</title>
    
    <script src="kelime/kelimeler-kategorili.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');

        :root {
            --bg-grad-1: #1e1b4b; --bg-grad-2: #020617;
            --primary: #3b82f6; --accent: #8b5cf6;
            --text-main: #f8fafc; --gold: #fbbf24;
            --bonus: #d946ef; --font-main: 'Outfit', sans-serif;
            --glass-bg: rgba(15, 23, 42, 0.8);
        }

        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: none; }

        body {
            background-color: var(--bg-grad-2); font-family: var(--font-main);
            margin: 0; padding: 0; width: 100vw; height: 100dvh;
            display: flex; flex-direction: column; overflow: hidden; color: var(--text-main);
        }

        .universe-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 100%, var(--bg-grad-1), var(--bg-grad-2) 80%);
            z-index: -3;
        }

        /* --- ÜST PANEL --- */
        .glass-panel {
            margin: 10px; background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 12px 15px; z-index: 20; display: flex; flex-direction: column; gap: 8px;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .category-badge h2 { margin: 0; font-size: 1.1rem; font-weight: 800; color: #fff; }
        .category-badge span { font-size: 0.6rem; color: var(--primary); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

        .hud-stats { display: flex; gap: 8px; }
        .stat-box { 
            background: rgba(0,0,0,0.4); padding: 5px 10px; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; min-width: 80px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-title { font-size: 0.5rem; color: #94a3b8; font-weight: 800; }
        .stat-num { font-size: 1.1rem; font-weight: 900; }
        .stat-num.gold { color: var(--gold); }

        /* --- GÜÇLENDİRİCİ VE KAYIT --- */
        .controls-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 5px; }
        .powerup-group { display: flex; gap: 5px; }
        .btn-action {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 6px 10px; display: flex; flex-direction: column;
            align-items: center; gap: 2px; transition: 0.2s; cursor: pointer;
        }
        .btn-action:active { transform: scale(0.9); background: rgba(255,255,255,0.15); }
        .btn-save { border-color: var(--gold); color: var(--gold); }
        .btn-action span { font-size: 0.55rem; font-weight: 800; }
        .cost { color: var(--gold); }

        /* --- OYUN ALANI --- */
        #game-area { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        #grid {
            display: grid; gap: 4px; padding: 8px;
            background: rgba(15, 23, 42, 0.4); border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1);
            width: min(94vw, 50vh); height: min(94vw, 50vh);
        }

        .cell {
            width: 100%; height: 100%; background: rgba(255,255,255,0.03);
            border-radius: 20%; display: flex; justify-content: center; align-items: center;
            font-size: calc( (min(94vw, 50vh) - 40px) / var(--grid-size) * 0.65 );
            font-weight: 900; color: #cbd5e1;
        }
        .cell.selected { background: #fff !important; color: #000 !important; border-radius: 50%; transform: scale(0.9); z-index: 10; }
        .cell.found { background: var(--primary) !important; color: #fff !important; border-radius: 8px; animation: pop 0.3s; }

        @keyframes pop { 0% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* --- ALT PANEL --- */
        #word-panel { flex: 0 0 auto; padding: 15px; text-align: center; background: linear-gradient(to top, var(--bg-grad-2), transparent); }
        #word-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; }
        .pill { padding: 6px 12px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; background: rgba(255,255,255,0.05); color: #64748b; border: 1px solid rgba(255,255,255,0.05); }
        .pill.found { background: var(--primary); color: #fff; border: none; }

        /* --- MODALLAR --- */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(2,6,23,0.95); display: none; 
            justify-content: center; align-items: center; z-index: 1000; 
        }
        .modal-content { 
            background: #1e293b; padding: 30px; border-radius: 30px; 
            text-align: center; width: 85%; max-width: 350px; border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-main { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; 
            background: var(--primary); color: #fff; font-weight: 900; 
            margin-top: 15px; font-size: 1rem; cursor: pointer;
        }

        #preview-bubble {
            position: fixed; background: #fff; color: #000; padding: 10px 20px;
            border-radius: 50px; font-weight: 900; pointer-events: none;
            display: none; z-index: 100; transform: translate(-50%, -120%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="universe-bg"></div>
    <div id="preview-bubble"></div>

    <div class="glass-panel">
        <div class="top-bar">
            <div class="category-badge">
                <span id="cat-title">BEKLEYİNİZ</span>
                <h2 id="lvl-title">BÖLÜM 1</h2>
            </div>
            <div class="hud-stats">
                <div class="stat-box">
                    <span class="stat-title">HESAP (KASA)</span>
                    <span class="stat-num gold" id="bank-txt">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-title">PUAN</span>
                    <span class="stat-num" id="score-txt">0</span>
                </div>
            </div>
        </div>
        
        <div class="controls-bar">
            <div class="powerup-group">
                <div class="btn-action" onclick="usePowerUp('hint', 100)">
                    <span>💡 İPUCU</span>
                    <span class="cost">100</span>
                </div>
                <div class="btn-action" onclick="usePowerUp('freeze', 200)">
                    <span>❄️ BUZ</span>
                    <span class="cost">200</span>
                </div>
            </div>

            <!-- DOSYA OLARAK İNDİRME BUTONU -->
            <div class="btn-action btn-save" onclick="downloadAccountFile()">
                <span>📥 HESABI</span>
                <span>DOSYA YAP</span>
            </div>

            <div class="btn-action" onclick="togglePause()">
                <span>⏸️ DURAKLAT</span>
            </div>
        </div>
    </div>

    <div id="game-area">
        <div id="grid"></div>
    </div>

    <div id="word-panel">
        <div id="word-list"></div>
    </div>

    <!-- MODAL: GİRİŞ -->
    <div class="modal" id="start-modal" style="display:flex;">
        <div class="modal-content">
            <div style="font-size: 3rem;">💰</div>
            <h1 style="margin:10px 0;">KELİME AVI</h1>
            <p id="save-info" style="color:#94a3b8; font-size: 0.9rem;"></p>
            <button class="btn-main" onclick="startGame()">BAŞLA</button>
            <button class="btn-main" style="background:transparent; border:1px solid #444;" onclick="resetProgress()">HESABI SIFIRLA</button>
        </div>
    </div>

    <!-- MODAL: KAZANMA -->
    <div class="modal" id="win-modal">
        <div class="modal-content">
            <div style="font-size: 3rem;">✨</div>
            <h2 style="color:var(--gold);">BÖLÜM TAMAM!</h2>
            <p id="win-stats" style="font-size: 1.2rem; font-weight: 800;"></p>
            <button class="btn-main" onclick="nextLevel()">SONRAKİ BÖLÜM</button>
            <button class="btn-main" style="background:#059669;" onclick="downloadAccountFile()">HESABI DOSYAYA KAYDET (.TXT)</button>
        </div>
    </div>

    <script>
        // Oyun Ayarları
        let bankGold = 0, currentLevel = 0, levelScore = 0;
        let gridSize = 8, grid = [], currentWords = [], foundCount = 0;
        let isSelecting = false, startCell = null, selectedCells = [];
        let isPaused = false;
        let cachedCells = [];

        // Türkçe Karakter Desteği
        const TR_UP = (s) => s.toLocaleUpperCase('tr-TR');

        window.onload = () => {
            loadFromStorage();
        };

        function loadFromStorage() {
            const saved = JSON.parse(localStorage.getItem('wordVaultPro') || '{"bank":0,"level":0}');
            bankGold = saved.bank;
            currentLevel = saved.level;
            updateUI();
            document.getElementById('save-info').textContent = `Kaldığın Yer: Seviye ${currentLevel + 1} | Kasa: ${bankGold}`;
        }

        function saveToStorage() {
            localStorage.setItem('wordVaultPro', JSON.stringify({ bank: bankGold, level: currentLevel }));
            updateUI();
        }

        function updateUI() {
            document.getElementById('bank-txt').textContent = bankGold;
            document.getElementById('score-txt').textContent = levelScore;
        }

        // --- HESABI DOSYA OLARAK İNDİRME FONKSİYONU ---
        function downloadAccountFile() {
            const date = new Date().toLocaleString('tr-TR');
            const fileContent = `
========================================
    KELİME AVI - HESAP HÜLASASI
========================================
Tarih         : ${date}
Mevcut Bölüm  : ${currentLevel + 1}
Toplam Altın  : ${bankGold}
Kategori      : ${document.getElementById('cat-title').textContent}
========================================
Bu dosya Kelime Puzzle oyunundaki ilerlemenizi 
belgelemek için oluşturulmuştur.
========================================`;

            const blob = new Blob([fileContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `hesap_ozeti_seviye_${currentLevel + 1}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function resetProgress() {
            if(confirm("Tüm altınların ve seviyen sıfırlanacak. Emin misin?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function startGame() {
            document.getElementById('start-modal').style.display = 'none';
            loadLevel();
        }

        function loadLevel() {
            document.getElementById('win-modal').style.display = 'none';
            const config = LEVEL_CONFIGS[currentLevel % LEVEL_CONFIGS.length];
            document.getElementById('cat-title').textContent = TR_UP(config.cat);
            document.getElementById('lvl-title').textContent = `BÖLÜM ${currentLevel + 1}`;
            
            const pool = [...WORD_POOLS[config.cat]].sort(() => Math.random() - 0.5);
            currentWords = pool.slice(0, config.count).map(o => ({...o, w: TR_UP(o.w), found: false}));
            
            gridSize = config.minGrid;
            document.documentElement.style.setProperty('--grid-size', gridSize);
            
            levelScore = 0; foundCount = 0;
            updateUI();
            createGrid();
            renderList();
        }

        function createGrid() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            grid = Array(gridSize).fill(null).map(() => Array(gridSize).fill(''));
            cachedCells = Array(gridSize).fill(null).map(() => Array(gridSize).fill(null));

            currentWords.forEach(obj => {
                let placed = false;
                let tries = 0;
                while(!placed && tries < 100) {
                    let r = Math.floor(Math.random()*gridSize), c = Math.floor(Math.random()*gridSize), d = Math.floor(Math.random()*3);
                    if(canPlace(obj.w, r, c, d)) {
                        for(let i=0; i<obj.w.length; i++){
                            let nr = r + (d===1?i : d===2?i : 0), nc = c + (d===0?i : d===2?i : 0);
                            grid[nr][nc] = obj.w[i];
                        }
                        placed = true;
                    }
                    tries++;
                }
            });

            const chars = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
            for(let r=0; r<gridSize; r++){
                for(let c=0; c<gridSize; c++){
                    if(!grid[r][c]) grid[r][c] = chars[Math.floor(Math.random()*chars.length)];
                    const div = document.createElement('div');
                    div.className = 'cell';
                    div.textContent = grid[r][c];
                    div.dataset.r = r; div.dataset.c = c;
                    
                    div.onmousedown = div.ontouchstart = (e) => { e.preventDefault(); startSelection(r, c); };
                    container.appendChild(div);
                    cachedCells[r][c] = div;
                }
            }
            document.onmousemove = document.ontouchmove = handleMove;
            document.onmouseup = document.ontouchend = endSelection;
        }

        function canPlace(word, r, c, d) {
            if(d===0 && c+word.length > gridSize) return false;
            if(d===1 && r+word.length > gridSize) return false;
            if(d===2 && (r+word.length > gridSize || c+word.length > gridSize)) return false;
            for(let i=0; i<word.length; i++){
                let nr = r + (d===1?i : d===2?i : 0), nc = c + (d===0?i : d===2?i : 0);
                if(grid[nr][nc] && grid[nr][nc] !== word[i]) return false;
            }
            return true;
        }

        function renderList() {
            const list = document.getElementById('word-list');
            list.innerHTML = '';
            currentWords.forEach(obj => {
                const div = document.createElement('div');
                div.className = 'pill';
                div.id = 'pill-' + obj.w;
                div.textContent = obj.w;
                list.appendChild(div);
            });
        }

        // --- SEÇİM VE KONTROL ---
        function startSelection(r, c) {
            if(isPaused) return;
            isSelecting = true;
            startCell = {r, c};
            selectedCells = [cachedCells[r][c]];
            cachedCells[r][c].classList.add('selected');
        }

        function handleMove(e) {
            if(!isSelecting) return;
            const touch = e.type.includes('touch') ? e.touches[0] : e;
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            
            if(target && target.classList.contains('cell')) {
                const r = parseInt(target.dataset.r), c = parseInt(target.dataset.c);
                const dr = r - startCell.r, dc = c - startCell.c;
                
                if(dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc)) {
                    document.querySelectorAll('.cell.selected').forEach(el => el.classList.remove('selected'));
                    selectedCells = [];
                    const steps = Math.max(Math.abs(dr), Math.abs(dc));
                    const ir = dr === 0 ? 0 : dr/steps, ic = dc === 0 ? 0 : dc/steps;
                    
                    for(let i=0; i<=steps; i++) {
                        const nr = startCell.r + (i*ir), nc = startCell.c + (i*ic);
                        const cell = cachedCells[nr][nc];
                        cell.classList.add('selected');
                        selectedCells.push(cell);
                    }
                    
                    const bubble = document.getElementById('preview-bubble');
                    bubble.style.display = 'block';
                    bubble.style.left = touch.clientX + 'px';
                    bubble.style.top = touch.clientY + 'px';
                    bubble.textContent = selectedCells.map(el => el.textContent).join('');
                }
            }
        }

        function endSelection() {
            if(!isSelecting) return;
            isSelecting = false;
            document.getElementById('preview-bubble').style.display = 'none';
            const word = selectedCells.map(el => el.textContent).join('');
            const rev = word.split('').reverse().join('');
            
            const match = currentWords.find(o => !o.found && (o.w === word || o.w === rev));
            
            if(match) {
                match.found = true;
                foundCount++;
                selectedCells.forEach(el => { el.classList.remove('selected'); el.classList.add('found'); });
                document.getElementById('pill-' + match.w).classList.add('found');
                levelScore += match.w.length * 20;
                updateUI();
                if(foundCount === currentWords.length) finishLevel();
            } else {
                selectedCells.forEach(el => el.classList.remove('selected'));
            }
        }

        function finishLevel() {
            bankGold += levelScore;
            saveToStorage();
            document.getElementById('win-stats').textContent = `Kazanılan: ${levelScore} Altın`;
            document.getElementById('win-modal').style.display = 'flex';
        }

        function nextLevel() {
            currentLevel++;
            saveToStorage();
            loadLevel();
        }

        function usePowerUp(type, cost) {
            if(bankGold < cost) { alert("Yetersiz Altın!"); return; }
            bankGold -= cost;
            saveToStorage();
            
            if(type === 'hint') {
                const target = currentWords.find(o => !o.found);
                if(target) {
                    alert(`İpucu: Kelimelerden biri "${target.w[0]}" ile başlıyor.`);
                }
            } else if(type === 'freeze') {
                alert("Zaman kavramı bu seviyede zaten yok, sakinleş!");
            }
        }

        function togglePause() { 
            isPaused = !isPaused; 
            alert(isPaused ? "Oyun Duraklatıldı" : "Oyun Devam Ediyor"); 
        }

    </script>
</body>
</html>
