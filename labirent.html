<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Labirent</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --neon: #00f2ff;
            --bg: #0a0a12;
            --glass: rgba(255, 255, 255, 0.08);
            --path: #11111d;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Orbitron', sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100dvh; overflow: hidden;
            touch-action: none;
        }

        /* Navigasyon Paneli */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; background: rgba(10,10,18,0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,242,255,0.15); z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .back-btn {
            background: rgba(0, 242, 255, 0.08); border: 1px solid var(--neon); color: var(--neon);
            padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 14px;
            font-family: 'Orbitron'; transition: all 0.25s; display:flex; align-items:center; gap:6px;
        }
        .back-btn:hover { background: rgba(0,242,255,0.18); box-shadow: 0 0 15px rgba(0,242,255,0.3); transform: translateX(-2px); }

        .action-btn {
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); color: white;
            padding: 7px 13px; border-radius: 8px; font-size: 10px; cursor: pointer;
            font-family: 'Orbitron'; transition: all 0.2s; margin-left: 6px;
        }
        .action-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.25); }

        /* HUD Paneli */
        .hud { width: 100%; padding: 10px 0; background: rgba(0,0,0,0.2); }
        .stats { display: flex; justify-content: space-around; font-size: 11px; }
        .stats b { color: var(--neon); font-size: 14px; }
        
        .progress-container {
            width: 90%; height: 6px; background: #222;
            margin: 8px auto; border-radius: 10px; overflow: hidden;
        }
        #progress-bar {
            width: 0%; height: 100%; background: var(--neon);
            box-shadow: 0 0 15px var(--neon); transition: width 0.3s ease-out;
        }

        /* Oyun Alanı */
        #game-area {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        canvas { 
            border-radius: 16px; 
            box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,242,255,0.1);
            background: var(--path);
        }

        /* Kontroller */
        .controls {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; padding: 15px 20px; width: 100%; max-width: 300px;
            margin: 0 auto;
        }
        .btn {
            height: 62px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; color: white; display: flex; align-items: center;
            justify-content: center; font-size: 22px; cursor: pointer;
            -webkit-tap-highlight-color: transparent; transition: all 0.15s;
        }
        .btn:active { background: var(--neon); color: black; box-shadow: 0 0 30px var(--neon); transform: scale(0.92); border-color: var(--neon); }

        /* Sonuç Ekranı */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.88);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(12px);
        }
        .modal { 
            background: linear-gradient(160deg, #0d0d1a, #090912); padding: 45px 50px; border-radius: 28px; 
            border: 1px solid rgba(0,242,255,0.35); text-align: center;
            box-shadow: 0 0 60px rgba(0,242,255,0.12), 0 30px 60px rgba(0,0,0,0.7);
        }
        .rank { font-size: 80px; font-weight: bold; margin: 10px 0; text-shadow: 0 0 30px var(--neon), 0 0 60px var(--neon); }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <button class="back-btn" onclick="window.location.href='index.html'">← GERİ</button>
        <div style="font-size: 14px; letter-spacing: 3px; font-weight: bold;">LABİRENT</div>
        <div class="save-load-btns">
            <button class="action-btn" onclick="exportData()">💾 KAYDET</button>
            <button class="action-btn" onclick="document.getElementById('fileInput').click()">📂 YÜKLE</button>
            <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
        </div>
    </nav>

    <div class="hud">
        <div class="stats">
            <div>SEVİYE <b><span id="lvl">1</span></b></div>
            <div>SÜRE <b><span id="timer">0.0</span></b></div>
            <div>YILDIZ <b><span id="orbs">0/3</span></b></div>
        </div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="game-area">
        <canvas id="mazeCanvas"></canvas>
    </div>

    <div class="controls">
        <div style="grid-column: 2" class="btn" id="up">▲</div>
        <div style="grid-column: 1" class="btn" id="left">◀</div>
        <div style="grid-column: 2" class="btn" id="down">▼</div>
        <div style="grid-column: 3" class="btn" id="right">▶</div>
    </div>

    <div id="overlay">
        <div class="modal">
            <div id="rank-val" class="rank">S</div>
            <h2 style="margin:0; color:var(--neon)">TAMAMLANDI!</h2>
            <p id="ov-msg" style="opacity:0.8"></p>
            <button class="action-btn" style="padding:15px 40px; font-size:16px; margin-top:20px; background:var(--neon); color:black; font-weight:bold;" onclick="nextLevel()">SIRADAKİ BÖLÜM</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const progressBar = document.getElementById('progress-bar');
        
        let gridSize = 13;
        let cellSize;
        let maze = [], player = {x: 1, y: 1}, exit = {x: 0, y: 0}, orbs = [];
        let collectedOrbs = 0;
        let level = 1, startTime, isRunning = false;
        let themeColor = '#00f2ff';
        let trail = [];

        function resize() {
            const hNav = document.querySelector('.top-nav').offsetHeight;
            const hHud = document.querySelector('.hud').offsetHeight;
            const hCtrl = document.querySelector('.controls').offsetHeight;
            const size = Math.min(window.innerWidth - 40, window.innerHeight - hNav - hHud - hCtrl - 40);
            canvas.width = size;
            canvas.height = size;
            cellSize = size / gridSize;
        }

        function generateMaze() {
            maze = Array.from({ length: gridSize }, () => Array(gridSize).fill(1));
            function carve(x, y) {
                maze[y][x] = 0;
                const dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
                for(let [dx, dy] of dirs) {
                    let nx = x + dx, ny = y + dy;
                    if(nx > 0 && nx < gridSize-1 && ny > 0 && ny < gridSize-1 && maze[ny][nx] === 1) {
                        maze[y + dy/2][x + dx/2] = 0;
                        carve(nx, ny);
                    }
                }
            }
            carve(1, 1);
            exit = {x: gridSize-2, y: gridSize-2};
            
            orbs = [];
            while(orbs.length < 3) {
                let rx = Math.floor(Math.random()*(gridSize-2))+1;
                let ry = Math.floor(Math.random()*(gridSize-2))+1;
                if(maze[ry][rx] === 0 && (rx !== 1 || ry !== 1) && (rx !== exit.x || ry !== exit.y)) {
                    if(!orbs.some(o => o.x === rx && o.y === ry)) orbs.push({x: rx, y: ry});
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for(let y=0; y<gridSize; y++) {
                for(let x=0; x<gridSize; x++) {
                    if(maze[y][x] === 1) {
                        ctx.fillStyle = '#1a1a2e'; 
                        ctx.fillRect(x*cellSize+1, y*cellSize+1, cellSize-2, cellSize-2);
                    }
                }
            }

            orbs.forEach(orb => {
                ctx.shadowBlur = 15; ctx.shadowColor = '#fff';
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc((orb.x+0.5)*cellSize, (orb.y+0.5)*cellSize, cellSize/6, 0, Math.PI*2);
                ctx.fill();
            });

            ctx.shadowBlur = 20; ctx.shadowColor = themeColor;
            ctx.fillStyle = themeColor;
            ctx.fillRect(exit.x*cellSize+cellSize*0.2, exit.y*cellSize+cellSize*0.2, cellSize*0.6, cellSize*0.6);

            // Oyuncu İzi (Beyaz ve Şeffaf)
            trail.forEach((t, i) => {
                ctx.globalAlpha = (i / trail.length) * 0.3;
                ctx.fillStyle = "white"; 
                ctx.beginPath();
                ctx.arc(t.x, t.y, cellSize/4, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            // Oyuncu (Beyaz Top)
            ctx.shadowBlur = 25; ctx.shadowColor = 'white';
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc((player.x+0.5)*cellSize, (player.y+0.5)*cellSize, cellSize/3.2, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function move(dx, dy) {
            if(!isRunning) return;
            let nx = player.x + dx;
            let ny = player.y + dy;
            
            if(nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize && maze[ny][nx] === 0) {
                trail.push({x: (player.x+0.5)*cellSize, y: (player.y+0.5)*cellSize});
                if(trail.length > 6) trail.shift();

                player.x = nx;
                player.y = ny;

                const dist = Math.abs(player.x - exit.x) + Math.abs(player.y - exit.y);
                progressBar.style.width = Math.max(0, 100 - (dist / (gridSize*2) * 100)) + "%";

                orbs = orbs.filter(o => {
                    if(o.x === player.x && o.y === player.y) {
                        collectedOrbs++;
                        document.getElementById('orbs').innerText = `${collectedOrbs}/3`;
                        if(navigator.vibrate) navigator.vibrate(40);
                        return false;
                    }
                    return true;
                });

                if(player.x === exit.x && player.y === exit.y) win();
                draw();
            }
        }

        function win() {
            isRunning = false;
            const time = ((Date.now() - startTime) / 1000);
            let rank = "C";
            if(time < gridSize * 0.9 && collectedOrbs === 3) rank = "S";
            else if(time < gridSize * 1.3) rank = "A";
            else if(time < gridSize * 2.0) rank = "B";

            document.getElementById('rank-val').innerText = rank;
            document.getElementById('ov-msg').innerText = `Zaman: ${time.toFixed(1)}sn | Yıldız: ${collectedOrbs}/3`;
            document.getElementById('overlay').style.display = 'flex';
        }

        function nextLevel() {
            level++;
            gridSize = Math.min(13 + (Math.floor(level/2) * 2), 45);
            document.getElementById('lvl').innerText = level;
            document.getElementById('overlay').style.display = 'none';
            collectedOrbs = 0;
            document.getElementById('orbs').innerText = "0/3";
            trail = [];
            init();
        }

        function exportData() {
            const data = { level, gridSize, time: Date.now(), game: "Labirent" };
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `labirent_save_lvl${level}.json`;
            a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    level = data.level; gridSize = data.gridSize;
                    init();
                    document.getElementById('lvl').innerText = level;
                } catch(e) { alert("Hata: Kayıt dosyası okunamadı!"); }
            };
            reader.readAsText(e.target.files[0]);
        }

        function updateTheme() {
            const colors = ['#00f2ff', '#ff007f', '#00ff88', '#ffcc00', '#bc13fe'];
            themeColor = colors[level % colors.length];
            document.documentElement.style.setProperty('--neon', themeColor);
        }

        function init() {
            resize();
            updateTheme();
            generateMaze();
            player = {x: 1, y: 1};
            isRunning = true;
            startTime = Date.now();
            draw();
        }

        window.onresize = () => { resize(); draw(); };
        window.onkeydown = (e) => {
            if(e.key === "ArrowUp") move(0,-1);
            if(e.key === "ArrowDown") move(0,1);
            if(e.key === "ArrowLeft") move(-1,0);
            if(e.key === "ArrowRight") move(1,0);
        };

        const ctrl = (id, dx, dy) => {
            const el = document.getElementById(id);
            el.onmousedown = el.ontouchstart = (e) => { e.preventDefault(); move(dx, dy); };
        };
        ctrl('up', 0, -1); ctrl('down', 0, 1); ctrl('left', -1, 0); ctrl('right', 1, 0);

        setInterval(() => {
            if(isRunning) document.getElementById('timer').innerText = ((Date.now() - startTime) / 1000).toFixed(1);
        }, 100);

        init();
    </script>
</body>
</html>
